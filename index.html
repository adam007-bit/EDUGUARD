<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Rakan Pembimbing Siswa (RPS)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { border: none; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); background: white; width: 100%; max-width: 500px; overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #1e293b, #2d3a4a); color: white; padding: 35px 30px; text-align: center; }
        .role-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .role-selector .btn { border-radius: 40px; font-weight: 600; font-size: 0.75rem; padding: 10px 5px; border: 1.5px solid #e2edff; background: #f8fbff; color: #2c3e66; transition: all 0.2s; }
        .role-selector .btn.active { background: #4361ee !important; border-color: #4361ee !important; color: white !important; }
        .form-control { border-radius: 14px; padding: 12px 16px; border: 1.5px solid #e2e8f0; background-color: #ffffff; }
        .form-control:focus { border-color: #4361ee; box-shadow: 0 0 0 3px rgba(67,97,238,0.1); }
        .btn-primary { border-radius: 14px; padding: 14px; font-weight: 700; background: #4361ee; border: none; transition: 0.3s; }
        .btn-primary:hover { background: #3046bd; transform: translateY(-2px); }
        .input-group-text { border-radius: 0 14px 14px 0; background: white; border: 1.5px solid #e2e8f0; border-left: none; cursor: pointer; }
        .password-input { border-radius: 14px 0 0 14px !important; }
        #langSwitcher { cursor: pointer; font-weight: 600; }
        .toggle-link { cursor: pointer; font-weight: 600; transition: 0.2s; }
        .toggle-link:hover { text-decoration: underline !important; color: #4361ee !important; }
    </style>
</head>
<body>

<div style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
    <button onclick="toggleLanguage()" class="btn btn-light shadow-sm btn-sm rounded-pill px-3 fw-bold">
        <i class="bi bi-translate me-1"></i> <span id="langBtn">BM</span>
    </button>
</div>

<div class="auth-card">
    <div class="auth-header">
        <i class="bi bi-shield-check-fill fs-1 mb-2 d-block"></i>
        <h3 class="fw-bold mb-1" id="authTitle">RPS Log In</h3>
        <p class="small mb-0 opacity-75" id="authSubTitle">Please enter your account details.</p>
    </div>

    <div class="p-4 p-xl-5">
        <div class="role-selector">
            <button type="button" id="btn-supervisor" class="btn active" onclick="switchRole('supervisor')">RPS</button>
            <button type="button" id="btn-student" class="btn" onclick="switchRole('student')">Student</button>
            <button type="button" id="btn-counselor" class="btn" onclick="switchRole('counselor')">Counselor</button>
            <button type="button" id="btn-host" class="btn" onclick="switchRole('host')">Coordinator</button>
        </div>

        <form id="authForm">
            <div class="mb-3" id="nameField" style="display: none;">
                <label class="fw-semibold small mb-2" id="lblFullName">Full Name</label>
                <input type="text" id="fullName" class="form-control" placeholder="Your full name">
            </div>
            <div class="mb-3">
                <label class="fw-semibold small mb-2" id="lblEmail">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
            </div>
            <div class="mb-4">
                <label class="fw-semibold small mb-2" id="lblPassword">Password</label>
                <div class="input-group">
                    <input type="password" id="password" class="form-control password-input" placeholder="••••••••" required>
                    <span class="input-group-text" id="btnTogglePassword">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </span>
                </div>
            </div>
            <button type="submit" id="authBtn" class="btn btn-primary w-100 shadow-sm">LOG IN</button>
        </form>

        <div class="text-center mt-4 pt-2">
            <span id="toggleText" class="text-muted small">Don't have an account?</span> 
            <a href="javascript:void(0)" id="toggleAuthLink" class="text-primary fw-bold text-decoration-none small ms-1 toggle-link">Register Here</a>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentLang = 'en';
    let isLoginMode = true;
    let currentRole = 'supervisor';

    const translations = {
        en: {
            subTitle: "Access the mentorship hub with your role credentials.",
            lblFullName: "Full Name", lblEmail: "Email Address", lblPassword: "Password",
            login: "Log In", register: "Register", loginBtn: "LOG IN →", registerBtn: "CREATE ACCOUNT",
            noAccount: "Don't have an account?", haveAccount: "Already registered?", regHere: "Register Here",
            student: "Student", counselor: "Counselor", host: "Coordinator",
            wait: "Authenticating...", success: "Welcome!", failed: "Access Denied",
            roleError: "Your registered role does not match the selected role.",
            regSuccessMsg: "Account created successfully! Please login using your credentials.",
            missingName: "Please enter your full name to register."
        },
        ms: {
            subTitle: "Akses pusat bimbingan dengan peranan anda.",
            lblFullName: "Nama Penuh", lblEmail: "Alamat Emel", lblPassword: "Kata Laluan",
            login: "Log Masuk", register: "Daftar", loginBtn: "LOG MASUK →", registerBtn: "DAFTAR AKAUN",
            noAccount: "Tiada akaun?", haveAccount: "Sudah berdaftar?", regHere: "Daftar di sini",
            student: "Pelajar", counselor: "Kaunselor", host: "Penyelaras",
            wait: "Sedang mengesahkan...", success: "Selamat Datang!", failed: "Akses Ditolak",
            roleError: "Peranan akaun anda tidak sepadan dengan pilihan semasa.",
            regSuccessMsg: "Akaun berjaya didaftarkan! Sila log masuk.",
            missingName: "Sila masukkan nama penuh untuk pendaftaran."
        }
    };

    function t(key) { return translations[currentLang][key] || key; }

    window.toggleLanguage = () => {
        currentLang = currentLang === 'en' ? 'ms' : 'en';
        document.getElementById('langBtn').innerText = currentLang === 'en' ? 'BM' : 'EN';
        updateUI();
    };

    function updateUI() {
        const roleNames = { 'supervisor': 'RPS', 'student': t('student'), 'host': t('host'), 'counselor': t('counselor') };
        const actionText = isLoginMode ? t('login') : t('register');
        document.getElementById('authTitle').innerText = `${actionText} ${roleNames[currentRole]}`;
        document.getElementById('authBtn').innerText = isLoginMode ? t('loginBtn') : t('registerBtn');
        document.getElementById('authSubTitle').innerText = t('subTitle');
        document.getElementById('lblFullName').innerText = t('lblFullName');
        document.getElementById('lblEmail').innerText = t('lblEmail');
        document.getElementById('lblPassword').innerText = t('lblPassword');
        document.getElementById('toggleText').innerText = isLoginMode ? t('noAccount') : t('haveAccount');
        document.getElementById('toggleAuthLink').innerText = isLoginMode ? t('regHere') : t('login');
        document.getElementById('nameField').style.display = isLoginMode ? 'none' : 'block';
        document.getElementById('fullName').required = !isLoginMode;
        document.getElementById('btn-student').innerText = t('student');
        document.getElementById('btn-counselor').innerText = t('counselor');
        document.getElementById('btn-host').innerText = t('host');
    }

    window.switchRole = (role) => {
        currentRole = role;
        document.querySelectorAll('.role-selector .btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${role}`).classList.add('active');
        updateUI();
    };

    document.getElementById('btnTogglePassword').addEventListener('click', () => {
        const passInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        if (passInput.type === 'password') {
            passInput.type = 'text';
            eyeIcon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            passInput.type = 'password';
            eyeIcon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    });

    document.getElementById('toggleAuthLink').addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        updateUI();
    });

    document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const fullName = document.getElementById('fullName').value.trim();

        if (!isLoginMode && !fullName) {
            Swal.fire({ icon: 'warning', title: t('failed'), text: t('missingName') });
            return;
        }

        Swal.fire({ title: t('wait'), allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            if (isLoginMode) {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (!userDoc.exists()) {
                    await signOut(auth);
                    Swal.fire({ icon: 'error', title: t('failed'), text: "Profile not found." });
                    return;
                }
                
                const userData = userDoc.data();
                if (userData.role !== currentRole) {
                    await signOut(auth);
                    Swal.fire({ icon: 'error', title: t('failed'), text: t('roleError') });
                    return;
                }
                
                sessionStorage.setItem("activeUser", user.uid);
                sessionStorage.setItem("userRole", userData.role);
                
                Swal.fire({ icon: 'success', title: t('success'), text: `Welcome, ${userData.name || user.email}`, timer: 1500, showConfirmButton: false });
                
                setTimeout(() => {
                    if (userData.role === 'student') {
                        window.location.href = userData.registrationStatus === 'complete' ? "student-view.html" : "register_course.html";
                    } else if (userData.role === 'supervisor') {
                        window.location.href = "dashboard.html";
                    } else if (userData.role === 'counselor') {
                        window.location.href = "counselor_dashboard.html";
                    } else if (userData.role === 'host') {
                        window.location.href = "host.html";
                    }
                }, 1200);
            } else {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                await setDoc(doc(db, "users", user.uid), {
                    name: fullName, email: email, role: currentRole,
                    registrationStatus: (currentRole === 'student') ? 'pending' : 'active',
                    createdAt: new Date().toISOString()
                });
                await signOut(auth);
                Swal.fire({ icon: 'success', title: t('success'), text: t('regSuccessMsg') }).then(() => {
                    isLoginMode = true;
                    updateUI();
                    document.getElementById('authForm').reset();
                });
            }
        } catch (error) {
            let errorMessage = error.message;
            if (errorMessage.includes("auth/email-already-in-use")) errorMessage = "Email already registered.";
            else if (errorMessage.includes("auth/weak-password")) errorMessage = "Password should be at least 6 characters.";
            else if (errorMessage.includes("auth/invalid-email")) errorMessage = "Invalid email format.";
            else if (errorMessage.includes("auth/user-not-found")) errorMessage = "No account found.";
            else if (errorMessage.includes("auth/wrong-password")) errorMessage = "Incorrect password.";
            Swal.fire({ icon: 'error', title: t('failed'), text: errorMessage });
        }
    });

    updateUI();
</script>
</body>
</html>
