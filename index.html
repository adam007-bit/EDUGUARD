<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Log Masuk & Daftar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            background: #f0f2f5; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
        }

        .navbar { background: white !important; padding: 15px 0; }

        .main-wrapper {
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .auth-card { 
            border: none; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            overflow: hidden; background: white; width: 100%; max-width: 450px; 
        }

        .auth-header { 
            background: linear-gradient(135deg, #4361ee, #4cc9f0); color: white; 
            padding: 40px 30px; text-align: center; 
        }

        .role-selector .btn { 
            border-radius: 12px; font-weight: 600; flex: 1; 
            border: 1px solid #e2e8f0; color: #64748b;
        }

        .role-selector .btn.active { background: #4361ee; border-color: #4361ee; color: white; }

        .form-control { 
            border-radius: 12px; padding: 12px; border: 1px solid #e2e8f0; background-color: #f8fafc;
        }

        .btn-primary { 
            border-radius: 12px; padding: 14px; font-weight: 700; 
            background: #4361ee; border: none; transition: 0.3s;
        }

        .input-group-text { 
            border-radius: 0 12px 12px 0; background: #f8fafc; cursor: pointer; 
            border: 1px solid #e2e8f0; border-left: none;
        }

        .password-input { border-radius: 12px 0 0 12px !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="#">
            <i class="bi bi-shield-check"></i> EduGuard <span class="text-warning">AI</span>
        </a>
    </div>
</nav>

<div class="main-wrapper mt-5">
    <div class="auth-card">
        <div class="auth-header">
            <i class="bi bi-person-circle fs-1 mb-2 d-block"></i>
            <h3 class="fw-bold mb-1" id="authTitle">Log Masuk RPS</h3>
            <p class="small mb-0 opacity-75">Sila masukkan butiran akaun anda.</p>
        </div>

        <div class="p-4">
            <div class="role-selector d-flex gap-2 mb-4">
                <button type="button" id="btn-supervisor" class="btn active" onclick="switchRole('supervisor')">RPS</button>
                <button type="button" id="btn-student" class="btn" onclick="switchRole('student')">Pelajar</button>
                <button type="button" id="btn-host" class="btn" onclick="switchRole('host')">Host</button>
            </div>

            <form id="authForm">
                <div class="mb-3" id="nameField" style="display: none;">
                    <label class="fw-semibold small mb-2">Nama Penuh</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Nama penuh anda">
                </div>

                <div class="mb-3">
                    <label class="fw-semibold small mb-2">Alamat Emel</label>
                    <input type="email" id="email" class="form-control" placeholder="contoh@emel.com" required>
                </div>

                <div class="mb-4">
                    <label class="fw-semibold small mb-2">Kata Laluan</label>
                    <div class="input-group">
                        <input type="password" id="password" class="form-control password-input" placeholder="••••••••" required>
                        <span class="input-group-text" id="btnTogglePassword">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </span>
                    </div>
                </div>

                <button type="submit" id="authBtn" class="btn btn-primary w-100 shadow-sm">LOG MASUK</button>
            </form>

            <div class="text-center mt-4">
                <span id="toggleText" class="text-muted small">Belum ada akaun?</span> 
                <a href="javascript:void(0)" id="toggleAuthLink" class="text-primary fw-bold text-decoration-none small ms-1">Daftar Sini</a>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Variables for Mode & Role
    window.isLoginMode = true;
    window.currentRole = 'supervisor';

    // 1. Toggle Lihat Kata Laluan
    document.getElementById('btnTogglePassword').addEventListener('click', () => {
        const passInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        const isText = passInput.type === 'text';
        passInput.type = isText ? 'password' : 'text';
        eyeIcon.classList.toggle('bi-eye');
        eyeIcon.classList.toggle('bi-eye-slash');
    });

    // 2. Tukar Role (Fungsi Global)
    window.switchRole = function(role) {
        window.currentRole = role;
        document.querySelectorAll('.role-selector .btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${role}`).classList.add('active');
        updateUI();
    };

    // 3. Tukar Antara Login & Daftar
    document.getElementById('toggleAuthLink').addEventListener('click', () => {
        window.isLoginMode = !window.isLoginMode;
        updateUI();
    });

    function updateUI() {
        const titleMap = { 'supervisor': 'RPS', 'student': 'Pelajar', 'host': 'Host' };
        document.getElementById('authTitle').innerText = (window.isLoginMode ? 'Log Masuk ' : 'Daftar ') + titleMap[window.currentRole];
        document.getElementById('authBtn').innerText = window.isLoginMode ? 'LOG MASUK' : 'DAFTAR SEKARANG';
        document.getElementById('nameField').style.display = window.isLoginMode ? 'none' : 'block';
        document.getElementById('toggleText').innerText = window.isLoginMode ? 'Belum ada akaun?' : 'Sudah ada akaun?';
        document.getElementById('toggleAuthLink').innerText = window.isLoginMode ? 'Daftar Sini' : 'Log Masuk';
    }

    // 4. Handle Form Submission
    document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const fullName = document.getElementById('fullName').value;

        Swal.fire({ title: 'Sila Tunggu...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            if (window.isLoginMode) {
                // PROSES LOG MASUK
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    // Pastikan user masuk mengikut role yang betul
                    if (userData.role === 'supervisor') window.location.href = "dashboard.html";
                    else if (userData.role === 'student') window.location.href = "student-view.html";
                    else window.location.href = "host.html";
                } else {
                    Swal.fire('Ralat', 'Data profil tidak dijumpai.', 'error');
                }
            } else {
                // PROSES DAFTAR
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    name: fullName,
                    email: email,
                    role: window.currentRole,
                    createdAt: new Date().toISOString()
                });

                Swal.fire('Berjaya!', 'Akaun anda telah dicipta.', 'success').then(() => {
                    window.isLoginMode = true;
                    updateUI();
                });
            }
        } catch (error) {
            console.error(error);
            let errorMsg = "Berlaku ralat teknikal.";
            
            if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                triggerRegistrationPrompt();
                return;
            } else if (error.code === 'auth/wrong-password') {
                errorMsg = "Kata laluan salah!";
            } else if (error.code === 'auth/email-already-in-use') {
                errorMsg = "Emel ini sudah berdaftar.";
            } else if (error.code === 'auth/weak-password') {
                errorMsg = "Kata laluan terlalu lemah (min. 6 aksara).";
            }
            
            Swal.fire('Ralat', errorMsg, 'error');
        }
    });

    function triggerRegistrationPrompt() {
        Swal.fire({
            title: 'Akaun Tidak Ditemui',
            text: "Emel/Kredential tidak sah. Adakah anda ingin mendaftar akaun baru?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#4361ee',
            confirmButtonText: 'Ya, Daftar Sini',
            cancelButtonText: 'Batal'
        }).then((result) => {
            if (result.isConfirmed) {
                window.isLoginMode = false;
                updateUI();
            }
        });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
