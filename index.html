<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Log Masuk & Daftar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            background: #f0f2f5; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
        }

        .navbar {
            background: white !important;
            padding: 15px 0;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card { 
            border: none; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            overflow: hidden; 
            background: white; 
            width: 100%; 
            max-width: 450px; 
        }

        .auth-header { 
            background: linear-gradient(135deg, #4361ee, #4cc9f0); 
            color: white; 
            padding: 40px 30px; 
            text-align: center; 
        }

        .role-selector .btn { 
            border-radius: 12px; 
            font-weight: 600; 
            flex: 1; 
            border: 1px solid #e2e8f0;
            color: #64748b;
        }

        .role-selector .btn.active {
            background: #4361ee;
            border-color: #4361ee;
            color: white;
        }

        .form-control, .form-select { 
            border-radius: 12px; 
            padding: 12px; 
            border: 1px solid #e2e8f0; 
            background-color: #f8fafc;
        }

        .btn-primary { 
            border-radius: 12px; 
            padding: 14px; 
            font-weight: 700; 
            background: #4361ee; 
            border: none; 
            transition: 0.3s;
        }

        .input-group-text { 
            border-radius: 0 12px 12px 0; 
            background: #f8fafc; 
            cursor: pointer; 
            border: 1px solid #e2e8f0;
            border-left: none;
        }

        .password-input { 
            border-radius: 12px 0 0 12px !important; 
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="#">
            <i class="bi bi-shield-check"></i> EduGuard <span class="text-warning">AI</span>
        </a>
    </div>
</nav>

<div class="main-wrapper mt-5">
    <div class="auth-card">
        <div class="auth-header">
            <i class="bi bi-person-circle fs-1 mb-2 d-block"></i>
            <h3 class="fw-bold mb-1" id="authTitle">Log Masuk RPS</h3>
            <p class="small mb-0 opacity-75" id="authSub">Sila masukkan butiran log masuk anda.</p>
        </div>

        <div class="p-4">
            <div class="role-selector d-flex gap-2 mb-4">
                <button type="button" id="btn-supervisor" class="btn active" onclick="switchRole('supervisor')">RPS</button>
                <button type="button" id="btn-student" class="btn" onclick="switchRole('student')">Pelajar</button>
                <button type="button" id="btn-host" class="btn" onclick="switchRole('host')">Host</button>
            </div>

            <form id="authForm">
                <div class="mb-3" id="nameField" style="display: none;">
                    <label class="fw-semibold small mb-2">Nama Penuh</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Nama penuh anda">
                </div>

                <div class="mb-3">
                    <label class="fw-semibold small mb-2">Alamat Emel</label>
                    <input type="email" id="email" class="form-control" placeholder="contoh@emel.com" required>
                </div>

                <div class="mb-3">
                    <label class="fw-semibold small mb-2" id="passLabel">Kata Laluan</label>
                    <div class="input-group">
                        <input type="password" id="password" class="form-control password-input" placeholder="••••••••" required>
                        <span class="input-group-text" id="btnTogglePassword">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </span>
                    </div>
                </div>

                <div id="studentExtraFields" style="display: none;">
                    <div class="mb-3">
                        <label class="fw-semibold small mb-2">Pilih Kursus</label>
                        <select id="courseSelect" class="form-select">
                            <option value="Software Engineering">Software Engineering</option>
                            <option value="IoT Systems">IoT Systems</option>
                            <option value="Data Analytics">Data Analytics</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="fw-semibold small mb-2">Pilih RPS (Supervisor)</label>
                        <select id="supervisorSelect" class="form-select">
                            <option value="">-- Sila Pilih RPS --</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="authBtn" class="btn btn-primary w-100 shadow-sm">LOG MASUK</button>
            </form>

            <div class="text-center mt-4">
                <span id="toggleText" class="text-muted small">Belum ada akaun?</span> 
                <a href="javascript:void(0)" id="toggleAuthLink" class="text-primary fw-bold text-decoration-none small ms-1">Daftar Sini</a>
            </div>
        </div>
    </div>
</div>

<script>
    let isLoginMode = true;
    let currentRole = 'supervisor';

    // 1. Fungsi Toggle Mata (Password Visibility)
    const btnTogglePassword = document.getElementById('btnTogglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    btnTogglePassword.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        eyeIcon.classList.toggle('bi-eye');
        eyeIcon.classList.toggle('bi-eye-slash');
    });

    // 2. Fungsi Tukar Peranan (RPS/Pelajar/Host)
    window.switchRole = function(role) {
        currentRole = role;
        document.querySelectorAll('.role-selector .btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${role}`).classList.add('active');
        
        const titleMap = { 'supervisor': 'RPS', 'student': 'Pelajar', 'host': 'Host' };
        document.getElementById('authTitle').innerText = (isLoginMode ? 'Log Masuk ' : 'Daftar ') + titleMap[role];
        
        updateFormUI();
    };

    // 3. Fungsi Tukar Log Masuk <-> Daftar
    const toggleAuthLink = document.getElementById('toggleAuthLink');
    toggleAuthLink.addEventListener('click', toggleMode);

    function toggleMode() {
        isLoginMode = !isLoginMode;
        updateFormUI();
    }

    function updateFormUI() {
        const titleMap = { 'supervisor': 'RPS', 'student': 'Pelajar', 'host': 'Host' };
        document.getElementById('authTitle').innerText = (isLoginMode ? 'Log Masuk ' : 'Daftar ') + titleMap[currentRole];
        document.getElementById('authBtn').innerText = isLoginMode ? 'LOG MASUK' : 'DAFTAR SEKARANG';
        document.getElementById('toggleText').innerText = isLoginMode ? 'Belum ada akaun?' : 'Sudah ada akaun?';
        document.getElementById('toggleAuthLink').innerText = isLoginMode ? 'Daftar Sini' : 'Log Masuk';
        
        // Tunjukkan field Nama jika Daftar
        document.getElementById('nameField').style.display = isLoginMode ? 'none' : 'block';
        
        // Field tambahan jika Pelajar mendaftar
        if (!isLoginMode && currentRole === 'student') {
            document.getElementById('studentExtraFields').style.display = 'block';
        } else {
            document.getElementById('studentExtraFields').style.display = 'none';
        }
    }

    // 4. Logik Submit Form (Simulasi Integration)
    document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        
        if (isLoginMode) {
            // SIMULASI: Anggap akaun ini tiada dalam database
            // Dalam auth.js sebenar, anda akan guna try-catch dengan Firebase
            const userExists = false; // Contoh logic gaga;

            if (!userExists) {
                Swal.fire({
                    title: 'Akaun Tidak Ditemui',
                    text: "Emel anda belum berdaftar dalam sistem kami. Adakah anda ingin mendaftar sekarang?",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#4361ee',
                    cancelButtonColor: '#64748b',
                    confirmButtonText: 'Ya, Daftar Sekarang',
                    cancelButtonText: 'Batal'
                }).then((result) => {
                    if (result.isConfirmed) {
                        toggleMode(); // Tukar ke mode daftar
                    }
                });
            }
        } else {
            // Simulasi Berjaya Daftar
            Swal.fire({
                title: 'Berjaya!',
                text: 'Akaun anda telah didaftarkan. Sila log masuk.',
                icon: 'success',
                confirmButtonColor: '#4361ee'
            }).then(() => {
                toggleMode();
            });
        }
    });
</script>

</body>
</html>
