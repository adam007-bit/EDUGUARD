<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Login & Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f0f2f5; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background: white !important; padding: 15px 0; }
        .main-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { border: none; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); overflow: hidden; background: white; width: 100%; max-width: 500px; }
        .auth-header { background: linear-gradient(135deg, #4361ee, #4cc9f0); color: white; padding: 40px 30px; text-align: center; }
        .role-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 25px; }
        .role-selector .btn { border-radius: 12px; font-weight: 600; border: 1px solid #e2e8f0; color: #64748b; font-size: 0.85rem; padding: 10px 5px; }
        .role-selector .btn.active { background: #4361ee !important; border-color: #4361ee !important; color: white !important; }
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #e2e8f0; background-color: #f8fafc; }
        .btn-primary { border-radius: 12px; padding: 14px; font-weight: 700; background: #4361ee; border: none; transition: 0.3s; }
        .input-group-text { border-radius: 0 12px 12px 0; background: #f8fafc; cursor: pointer; border: 1px solid #e2e8f0; border-left: none; }
        .password-input { border-radius: 12px 0 0 12px !important; }
        #langSwitcher { cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm">
    <div class="container d-flex justify-content-between">
        <a class="navbar-brand fw-bold text-primary" href="#">
            <i class="bi bi-shield-check"></i> EduGuard <span class="text-warning">AI</span>
        </a>
        <button class="btn btn-outline-secondary btn-sm" id="langSwitcher" onclick="toggleLanguage()">
            <i class="bi bi-translate"></i> <span id="langText">Bahasa Melayu</span>
        </button>
    </div>
</nav>

<div class="main-wrapper mt-5">
    <div class="auth-card">
        <div class="auth-header">
            <i class="bi bi-person-circle fs-1 mb-2 d-block"></i>
            <h3 class="fw-bold mb-1" id="authTitle">RPS Log In</h3>
            <p class="small mb-0 opacity-75" id="authSubTitle">Please enter your account details.</p>
        </div>

        <div class="p-4">
            <div class="role-selector">
                <button type="button" id="btn-supervisor" class="btn active" onclick="switchRole('supervisor')">RPS</button>
                <button type="button" id="btn-student" class="btn" onclick="switchRole('student')">Student</button>
                <button type="button" id="btn-counselor" class="btn" onclick="switchRole('counselor')">Counselor</button>
                <button type="button" id="btn-host" class="btn" onclick="switchRole('host')">Course Coordinator</button>
            </div>

            <form id="authForm">
                <div class="mb-3" id="nameField" style="display: none;">
                    <label class="fw-semibold small mb-2" id="lblFullName">Full Name</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Your full name">
                </div>

                <div class="mb-3">
                    <label class="fw-semibold small mb-2" id="lblEmail">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
                </div>

                <div class="mb-4">
                    <label class="fw-semibold small mb-2" id="lblPassword">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" class="form-control password-input" placeholder="••••••••" required>
                        <span class="input-group-text" id="btnTogglePassword">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </span>
                    </div>
                </div>

                <button type="submit" id="authBtn" class="btn btn-primary w-100 shadow-sm">LOG IN</button>
            </form>

            <div class="text-center mt-4">
                <span id="toggleText" class="text-muted small">Don't have an account?</span> 
                <a href="javascript:void(0)" id="toggleAuthLink" class="text-primary fw-bold text-decoration-none small ms-1">Register Here</a>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- Translation Logic ---
    window.currentLang = 'en';
    const translations = {
        en: {
            subTitle: "Please enter your account details.",
            lblFullName: "Full Name",
            lblEmail: "Email Address",
            lblPassword: "Password",
            login: "Log In",
            register: "Register",
            loginBtn: "LOG IN",
            registerBtn: "REGISTER NOW",
            noAccount: "Don't have an account?",
            haveAccount: "Already have an account?",
            regHere: "Register Here",
            student: "Student",
            counselor: "Counselor",
            host: "Course Coordinator",
            wait: "Please wait...",
            success: "Success!",
            failed: "Failed",
            roleError: "Your account is not registered under this role."
        },
        ms: {
            subTitle: "Sila masukkan butiran akaun anda.",
            lblFullName: "Nama Penuh",
            lblEmail: "Alamat Emel",
            lblPassword: "Kata Laluan",
            login: "Log Masuk",
            register: "Daftar",
            loginBtn: "LOG MASUK",
            registerBtn: "DAFTAR SEKARANG",
            noAccount: "Belum mempunyai akaun?",
            haveAccount: "Sudah mempunyai akaun?",
            regHere: "Daftar di Sini",
            student: "Pelajar",
            counselor: "Kaunselor",
            host: "Penyelaras Kursus",
            wait: "Sila tunggu...",
            success: "Berjaya!",
            failed: "Gagal",
            roleError: "Akaun anda tidak didaftarkan di bawah peranan ini."
        }
    };

    window.toggleLanguage = function() {
        window.currentLang = (window.currentLang === 'en') ? 'ms' : 'en';
        document.getElementById('langText').innerText = (window.currentLang === 'en') ? 'Bahasa Melayu' : 'English';
        window.updateUI();
    };

    window.isLoginMode = true;
    window.currentRole = 'supervisor';

    window.updateUI = function() {
        const t = translations[window.currentLang];
        const roleNames = { 
            'supervisor': 'RPS', 
            'student': t.student, 
            'host': t.host, 
            'counselor': t.counselor 
        };
        
        const actionText = window.isLoginMode ? t.login : t.register;
        document.getElementById('authTitle').innerText = `${actionText} ${roleNames[window.currentRole]}`;
        document.getElementById('authBtn').innerText = window.isLoginMode ? t.loginBtn : t.registerBtn;
        
        document.getElementById('authSubTitle').innerText = t.subTitle;
        document.getElementById('lblFullName').innerText = t.lblFullName;
        document.getElementById('lblEmail').innerText = t.lblEmail;
        document.getElementById('lblPassword').innerText = t.lblPassword;
        
        document.getElementById('toggleText').innerText = window.isLoginMode ? t.noAccount : t.haveAccount;
        document.getElementById('toggleAuthLink').innerText = window.isLoginMode ? t.regHere : t.login;

        document.getElementById('nameField').style.display = window.isLoginMode ? 'none' : 'block';
        document.getElementById('fullName').required = !window.isLoginMode;
        
        document.getElementById('btn-student').innerText = t.student;
        document.getElementById('btn-counselor').innerText = t.counselor;
        document.getElementById('btn-host').innerText = t.host;
    };

    window.switchRole = function(role) {
        window.currentRole = role;
        document.querySelectorAll('.role-selector .btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${role}`).classList.add('active');
        window.updateUI();
    };

    document.getElementById('btnTogglePassword').addEventListener('click', () => {
        const passInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        if (passInput.type === 'password') {
            passInput.type = 'text';
            eyeIcon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            passInput.type = 'password';
            eyeIcon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    });

    document.getElementById('toggleAuthLink').addEventListener('click', () => {
        window.isLoginMode = !window.isLoginMode;
        window.updateUI();
    });

    document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const t = translations[window.currentLang];
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const fullName = document.getElementById('fullName').value.trim();

        Swal.fire({ title: t.wait, allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            if (window.isLoginMode) {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();

                    // --- SEMAKAN PERANAN (ROLE CHECK) ---
                    if (userData.role !== window.currentRole) {
                        await signOut(auth); // Sign out user jika role salah
                        Swal.fire({ icon: 'error', title: t.failed, text: t.roleError });
                        return;
                    }

                    sessionStorage.setItem("activeUser", user.uid);
                    Swal.fire({ icon: 'success', title: t.success, text: `Welcome, ${userData.name}`, timer: 1500, showConfirmButton: false })
                    .then(() => {
                        // --- LOGIK HALA TUJU (REDIRECT) ---
                        if (userData.role === 'student') {
                            window.location.href = userData.registrationStatus === 'complete' ? "student-view.html" : "register_course.html";
                        } else if (userData.role === 'supervisor') {
                            window.location.href = "dashboard.html";
                        } else if (userData.role === 'counselor') {
                            window.location.href = "counselor_dashboard.html";
                        } else if (userData.role === 'host') {
                            window.location.href = "host.html";
                        } else {
                            window.location.href = "host.html";
                        }
                    });
                } else {
                    throw new Error("Profile error.");
                }
            } else {
                // Proses Pendaftaran
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                await setDoc(doc(db, "users", user.uid), {
                    name: fullName,
                    email: email,
                    role: window.currentRole,
                    registrationStatus: 'pending',
                    createdAt: new Date().toISOString()
                });
                Swal.fire(t.success, 'Account registered.', 'success').then(() => {
                    window.isLoginMode = true;
                    window.updateUI();
                });
            }
        } catch (error) {
            Swal.fire(t.failed, error.message, 'error');
        }
    });

    window.updateUI();
</script>
</body>
</html>
