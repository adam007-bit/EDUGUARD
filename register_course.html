<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Course Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f0f2f5; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .reg-card { border: none; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); background: white; width: 100%; max-width: 450px; padding: 30px; }
        .form-control, .form-select { border-radius: 12px; padding: 12px; border: 1px solid #e2e8f0; background-color: #f8fafc; }
        .btn-primary { border-radius: 12px; padding: 14px; font-weight: 700; background: #4361ee; border: none; width: 100%; transition: 0.3s; }
        .btn-primary:hover { background: #3046bd; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="reg-card">
    <div class="text-center mb-4">
        <div class="bg-primary text-white d-inline-block p-3 rounded-circle mb-3">
            <i class="bi bi-journal-plus fs-3"></i>
        </div>
        <h3 class="fw-bold">Course Registration</h3>
        <p class="text-muted small">Please select your course and supervisor.</p>
    </div>

    <form id="courseRegForm">
        <div class="mb-3">
            <label class="fw-semibold small mb-2">Student ID</label>
            <input type="text" id="displayID" class="form-control fw-bold text-primary" readonly>
        </div>

        <div class="mb-3">
            <label class="fw-semibold small mb-2">Select Course</label>
            <select id="course" class="form-select" required>
                <option value="">-- Choose Course --</option>
                <option value="Software Engineering">Software Engineering</option>
                <option value="IoT Systems">IoT Systems</option>
                <option value="Data AI & Robotics">Data AI & Robotics</option>
                <option value="Cyber Security">Cyber Security</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="fw-semibold small mb-2">Supervisor (RPS)</label>
            <select id="supervisor" class="form-select" required>
                <option value="">Loading list...</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary shadow-sm">CONFIRM REGISTRATION</button>
        <button type="button" class="btn btn-link w-100 mt-2 text-decoration-none text-muted small" onclick="window.location.href='student-view.html'">Cancel & Return</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, doc, updateDoc, setDoc, collection, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const activeID = sessionStorage.getItem("activeUser");
    
    // Ensure we get the student name from Firestore if tempName is missing
    let studentFullName = sessionStorage.getItem("tempRegName") || "Student";

    if (!activeID) {
        window.location.href = "index.html";
    } else {
        document.getElementById('displayID').value = activeID;
    }

    async function loadSupervisors() {
        const svDropdown = document.getElementById('supervisor');
        try {
            const q = query(collection(db, "users"), where("role", "==", "supervisor"));
            const snap = await getDocs(q);
            svDropdown.innerHTML = '<option value="">-- Choose Supervisor --</option>';
            snap.forEach(doc => {
                svDropdown.innerHTML += `<option value="${doc.data().email}">${doc.data().name}</option>`;
            });
        } catch (e) {
            svDropdown.innerHTML = '<option>Error loading data</option>';
        }
    }
    loadSupervisors();

    document.getElementById('courseRegForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const selectedCourse = document.getElementById('course').value;
        const selectedSupervisor = document.getElementById('supervisor').value;
        
        // UNIQUE: Combination of Student ID + Course Name (allows registering for multiple different courses)
        const uniqueDocID = `${activeID}_${selectedCourse.replace(/\s+/g, '')}`;

        Swal.fire({ title: 'Saving Registration...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            // 1. Save registration record in 'course_registrations' collection
            await setDoc(doc(db, "course_registrations", uniqueDocID), {
                studentID: activeID,
                studentName: studentFullName,
                course: selectedCourse,
                supervisorEmail: selectedSupervisor,
                totalMark: 0,
                grade: "-",
                status: "Pending",
                timestamp: serverTimestamp()
            });

            // 2. Update main user profile
            // Save the last selected supervisorEmail as a primary reference for assessments
            await updateDoc(doc(db, "users", activeID), {
                registrationStatus: "complete",
                supervisorEmail: selectedSupervisor 
            });

            Swal.fire({ 
                icon: 'success', 
                title: 'Success!', 
                text: `You have successfully registered for the course: ${selectedCourse}`, 
                timer: 2000, 
                showConfirmButton: false 
            })
            .then(() => {
                window.location.href = "student-view.html";
            });
        } catch (error) {
            Swal.fire('Failed', 'Please try again: ' + error.message, 'error');
        }
    });
</script>
</body>
</html>
