<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Pendaftaran Kursus</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #4361ee; --accent: #4cc9f0; }
        body { background: #f0f4f8; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .reg-card { max-width: 450px; width: 100%; background: white; border-radius: 24px; padding: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .btn-tech { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border: none; border-radius: 12px; padding: 14px; font-weight: 700; width: 100%; transition: 0.3s; }
        .form-control, .form-select { border-radius: 10px; padding: 12px; border: 1px solid #cbd5e1; }
    </style>
</head>
<body>

<div class="reg-card">
    <div class="text-center mb-4">
        <h4 class="fw-bold text-primary"><i class="bi bi-shield-lock-fill"></i> EDUGUARD AI</h4>
        <p class="small text-muted text-uppercase">Lengkapkan Pendaftaran Kursus</p>
    </div>

    <form id="courseRegForm">
        <div class="mb-3">
            <label class="small fw-bold text-secondary">ID PELAJAR</label>
            <input type="text" id="displayID" class="form-control bg-light fw-bold" readonly>
        </div>

        <div class="mb-3">
            <label class="small fw-bold text-secondary">PROGRAM PENGAJIAN</label>
            <select id="course" class="form-select" required>
                <option value="">-- PILIH KURSUS --</option>
                <option value="Software Engineering">Software Engineering</option>
                <option value="IoT Systems">IoT Systems</option>
                <option value="Data Analytics">Data Analytics</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="small fw-bold text-secondary">PENYELIA (RPS)</label>
            <select id="supervisor" class="form-select" required>
                <option value="">Memuatkan senarai SV...</option>
            </select>
        </div>

        <button type="submit" class="btn btn-tech mt-3">AKTIFKAN PROFIL <i class="bi bi-arrow-right-short ms-1"></i></button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, doc, updateDoc, setDoc, collection, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw", authDomain: "eduguard-ai-2742b.firebaseapp.com", projectId: "eduguard-ai-2742b", storageBucket: "eduguard-ai-2742b.firebasestorage.app", messagingSenderId: "96233022148", appId: "1:96233022148:web:1f903d72b3f79690409f91" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const activeID = sessionStorage.getItem("activeUser") || sessionStorage.getItem("tempRegID");
    const tempName = sessionStorage.getItem("tempRegName");

    if (!activeID) window.location.href = "index.html";
    document.getElementById('displayID').value = activeID;

    async function fetchSupervisors() {
        const svSelect = document.getElementById('supervisor');
        try {
            const q = query(collection(db, "users"), where("role", "==", "supervisor"));
            const snap = await getDocs(q);
            svSelect.innerHTML = '<option value="">-- PILIH PENYELIA --</option>';
            snap.forEach(doc => {
                const sv = doc.data();
                svSelect.innerHTML += `<option value="${sv.email}">${sv.name.toUpperCase()}</option>`;
            });
        } catch (e) { svSelect.innerHTML = '<option>Ralat data</option>'; }
    }
    fetchSupervisors();

    document.getElementById('courseRegForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            await setDoc(doc(db, "course_registrations", `${activeID}_ACTIVE`), {
                studentID: activeID,
                studentName: tempName,
                course: document.getElementById('course').value,
                supervisorEmail: document.getElementById('supervisor').value,
                totalMark: 0,
                grade: "-",
                status: "Pending",
                timestamp: serverTimestamp()
            });

            await updateDoc(doc(db, "users", activeID), {
                registrationStatus: "complete"
            });

            Swal.fire('Berjaya!', 'Profil Aktif.', 'success').then(() => {
                sessionStorage.setItem("activeUser", activeID);
                window.location.href = "student-view.html";
            });
        } catch (error) { Swal.fire('Ralat', error.message, 'error'); }
    });
</script>
</body>
</html>
