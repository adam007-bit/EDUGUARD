<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .nav-custom { background: white; border-bottom: 1px solid #e2e8f0; }
        .header-box { background: #1e293b; color: white; padding: 40px 0; border-radius: 0 0 30px 30px; }
        .course-card { background: white; border-radius: 18px; padding: 20px; border: 1px solid #e2e8f0; transition: 0.3s; }
        .course-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .grade-circle { width: 55px; height: 55px; background: #eff6ff; color: #2563eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; }
    </style>
</head>
<body>

<nav class="navbar nav-custom px-3">
    <a class="navbar-brand fw-bold text-primary" href="#"><i class="bi bi-shield-check-fill me-2"></i>EduGuard AI</a>
    <button class="btn btn-light btn-sm rounded-pill border" onclick="logout()">Log Keluar</button>
</nav>

<div class="header-box text-center">
    <div class="container">
        <h3 class="fw-bold mb-1">Hai, <span id="studentNameDisplay">...</span></h3>
        <p class="small text-white-50">Log Masuk Sebagai: <span id="studentIDDisplay">...</span></p>
    </div>
</div>

<div class="container mt-4">
    <h6 class="fw-bold text-secondary mb-3 px-1 text-uppercase small">Maklumat Pengajian</h6>
    <div id="courseList" class="row g-3">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary opacity-50"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw", authDomain: "eduguard-ai-2742b.firebaseapp.com", projectId: "eduguard-ai-2742b", storageBucket: "eduguard-ai-2742b.firebasestorage.app", messagingSenderId: "96233022148", appId: "1:96233022148:web:1f903d72b3f79690409f91" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const activeID = sessionStorage.getItem("activeUser");

    if (!activeID) {
        window.location.href = "index.html";
    }

    async function initializeDashboard() {
        const list = document.getElementById('courseList');
        try {
            const userSnap = await getDoc(doc(db, "users", activeID));
            if (userSnap.exists()) {
                document.getElementById('studentNameDisplay').innerText = userSnap.data().name;
                document.getElementById('studentIDDisplay').innerText = activeID;
            }

            const q = query(collection(db, "course_registrations"), where("studentID", "==", activeID));
            const querySnapshot = await getDocs(q);
            
            list.innerHTML = '';
            if (querySnapshot.empty) {
                list.innerHTML = '<div class="col-12 text-center text-muted py-5">Tiada kursus terdaftar.</div>';
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="col-md-6">
                        <div class="course-card d-flex align-items-center justify-content-between">
                            <div>
                                <span class="badge bg-primary mb-2" style="font-size: 0.6rem;">${data.semester}</span>
                                <h6 class="fw-bold mb-1">${data.course}</h6>
                                <p class="small text-muted mb-0">SV: ${data.supervisorEmail}</p>
                            </div>
                            <div class="text-end">
                                <div class="grade-circle mx-auto mb-1">${data.grade}</div>
                                <div class="fw-bold small">${data.totalMark}%</div>
                            </div>
                        </div>
                    </div>`;
            });
        } catch (e) { list.innerHTML = '<p class="text-danger text-center">Gagal memuatkan data.</p>'; }
    }

    window.logout = () => {
        sessionStorage.clear();
        window.location.href = "index.html";
    };

    initializeDashboard();
</script>
</body>
</html>
