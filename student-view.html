<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Dashboard Pelajar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --p-blue: #4361ee; --bg-light: #f8fafc; }
        body { background: var(--bg-light); font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; }
        
        .nav-custom { background: white; border-bottom: 1px solid #e2e8f0; padding: 12px 0; position: sticky; top: 0; z-index: 1000; }
        .header-box { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; padding: 50px 0; border-radius: 0 0 40px 40px; margin-bottom: 40px; }
        
        .glass-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; padding: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); transition: 0.3s; }
        .glass-card:hover { transform: translateY(-5px); }
        .material-card { border-left: 5px solid var(--p-blue); background: #ffffff; border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid #edf2f7; }
        .grade-circle { width: 55px; height: 55px; background: #eff6ff; color: var(--p-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; }
        
        .section-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; }
        .section-title i { color: var(--p-blue); margin-right: 12px; font-size: 1.3rem; }
        .badge-status { font-size: 0.7rem; padding: 5px 12px; border-radius: 50px; }
    </style>
</head>
<body>

<nav class="navbar nav-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand fw-bold text-primary"><i class="bi bi-shield-check-fill me-2"></i>EduGuard AI</span>
        <div class="d-flex gap-2">
            <button class="btn btn-primary btn-sm rounded-pill px-4 fw-600 shadow-sm" onclick="window.location.href='register_course.html'">
                <i class="bi bi-plus-lg me-1"></i> Daftar Kursus Baru
            </button>
            <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </div>
</nav>

<div class="header-box text-center shadow-sm">
    <div class="container">
        <h2 class="fw-bold mb-1">Selamat Datang, <span id="studentNameDisplay" class="text-warning">...</span></h2>
        <p class="opacity-75 small mb-0"><i class="bi bi-person-badge me-1"></i> ID: <span id="studentIDDisplay" class="fw-bold">...</span></p>
    </div>
</div>

<div class="container pb-5">
    <div class="row g-4">
        
        <div class="col-lg-7">
            <h5 class="section-title"><i class="bi bi-grid-fill"></i> Ringkasan Akademik</h5>
            <div id="courseList">
                <div class="text-center py-5 text-muted"><div class="spinner-border text-primary mb-2 text-sm"></div></div>
            </div>

            <h5 class="section-title mt-5"><i class="bi bi-heart-pulse-fill"></i> Saringan Stress Pelajar</h5>
            <div class="glass-card">
                <div class="d-flex align-items-start mb-3">
                    <div class="bg-light p-3 rounded-4 me-3 text-primary"><i class="bi bi-clipboard2-pulse fs-4"></i></div>
                    <div>
                        <h6 class="fw-bold mb-1">Status Kesihatan Mental</h6>
                        <p class="text-muted small mb-0">Laporan akan dihantar terus kepada Penyelia anda.</p>
                    </div>
                </div>
                <div id="stressResultArea" class="mb-4 d-none p-3 bg-light rounded-3 border">
                    <small class="text-muted d-block mb-1">Keputusan Terakhir:</small>
                    <h5 id="stressLevelLabel" class="fw-bold mb-0 text-primary">...</h5>
                </div>
                <button class="btn btn-dark w-100 fw-bold py-3 rounded-4 shadow-sm" id="btnPsiko" onclick="openPsiko()">
                    <i class="bi bi-pencil-square me-2"></i> MULA SARINGAN SEKARANG
                </button>
            </div>
        </div>

        <div class="col-lg-5">
            <h5 class="section-title"><i class="bi bi-collection-play-fill"></i> Bahan & Nota Kursus</h5>
            <div id="materialList">
                <div class="text-center py-5 bg-white rounded-4 border border-dashed">
                    <p class="small text-muted">Sila daftar kursus untuk melihat bahan.</p>
                </div>
            </div>
        </div>

    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, setDoc, collection, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const activeID = sessionStorage.getItem("activeUser");

    if (!activeID) window.location.href = "index.html";

    let currentUserData = null;

    async function initDashboard() {
        try {
            const uSnap = await getDoc(doc(db, "users", activeID));
            if (uSnap.exists()) {
                currentUserData = uSnap.data();
                document.getElementById('studentNameDisplay').innerText = currentUserData.name;
                document.getElementById('studentIDDisplay').innerText = activeID;
                
                if(currentUserData.psikoStatus === 'done') {
                    document.getElementById('stressResultArea').classList.remove('d-none');
                    document.getElementById('stressLevelLabel').innerText = `RISIKO ${currentUserData.stressLevel}`;
                    document.getElementById('btnPsiko').innerText = "ULANG SARINGAN";
                    document.getElementById('btnPsiko').className = "btn btn-outline-dark w-100 fw-bold py-2 rounded-4";
                }
            }
            loadAcademicData();
        } catch (e) { console.error("Init Error:", e); }
    }

    async function loadAcademicData() {
        const cContainer = document.getElementById('courseList');
        const mContainer = document.getElementById('materialList');
        
        // Ambil SEMUA pendaftaran untuk ID ini
        const qC = query(collection(db, "course_registrations"), where("studentID", "==", activeID));
        const snapC = await getDocs(qC);

        if (snapC.empty) {
            cContainer.innerHTML = `<div class="alert alert-warning rounded-4 border-0 p-4 small text-center">Anda belum mendaftar mana-mana kursus.</div>`;
            mContainer.innerHTML = `<div class="text-center p-4 text-muted small">Tiada bahan tersedia.</div>`;
            return;
        }

        cContainer.innerHTML = '';
        let userCourses = [];

        snapC.forEach(d => {
            const data = d.data();
            userCourses.push(data.course); // Kumpul semua subjek yang didaftar
            
            cContainer.innerHTML += `
                <div class="glass-card mb-3 d-flex align-items-center justify-content-between animate__animated animate__fadeIn">
                    <div>
                        <h6 class="fw-bold mb-1">${data.course}</h6>
                        <span class="badge badge-status ${data.status === 'Marked' ? 'bg-success' : 'bg-warning text-dark'}">
                            ${data.status}
                        </span>
                    </div>
                    <div class="d-flex align-items-center border-start ps-3">
                        <div class="text-end me-3">
                            <div class="fw-bold text-primary" style="font-size: 1.1rem;">${data.totalMark || 0}%</div>
                            <small class="text-muted" style="font-size: 0.6rem;">MARKAH</small>
                        </div>
                        <div class="grade-circle shadow-sm">${data.grade || '-'}</div>
                    </div>
                </div>`;
        });

        // MUAT BAHAN berdasarkan subjek-subjek yang ada dalam array userCourses
        if (userCourses.length > 0) {
            // Firebase 'in' operator boleh cari sehingga 10 values dalam satu query
            const qM = query(collection(db, "materials"), where("course", "in", userCourses));
            const snapM = await getDocs(qM);
            
            mContainer.innerHTML = '';
            if (snapM.empty) {
                mContainer.innerHTML = `<div class="text-center py-5 text-muted small">Belum ada bahan dimuat naik oleh pensyarah.</div>`;
            } else {
                snapM.forEach(doc => {
                    const m = doc.data();
                    mContainer.innerHTML += `
                        <div class="material-card shadow-sm animate__animated animate__fadeInRight">
                            <span class="badge bg-primary-subtle text-primary mb-2" style="font-size: 0.6rem;">${m.category}</span>
                            <h6 class="fw-bold mb-1">${m.title}</h6>
                            <p class="text-muted mb-3" style="font-size: 0.75rem;">Subjek: <b>${m.course}</b></p>
                            <a href="${m.content}" target="_blank" class="btn btn-sm btn-primary w-100 rounded-pill py-2">Buka Bahan</a>
                        </div>`;
                });
            }
        }
    }

  window.openPsiko = () => {
    Swal.fire({
        title: 'Analisis AI: Maklum Balas Pembelajaran',
        html: `
            <div class="text-start px-2">
                <p class="text-muted small mb-3">Sila ceritakan masalah atau cabaran yang anda hadapi dalam subjek yang didaftarkan. AI akan menganalisis tahap risiko anda.</p>
                <label class="fw-bold mb-2 small">Apakah cabaran utama anda sekarang?</label>
                <textarea id="aiInput" class="form-control" rows="5" 
                    placeholder="Contoh: Saya rasa sangat tertekan dengan projek IoT. Masa tidak cukup dan saya rasa mahu berputus asa..."></textarea>
                <div id="charCount" class="text-end small text-muted mt-1">0/200 patah perkataan</div>
            </div>
        `,
        confirmButtonText: 'Analisis & Hantar',
        showCancelButton: true,
        confirmButtonColor: '#4361ee',
        preConfirm: () => {
            const text = document.getElementById('aiInput').value;
            if (text.length < 10) {
                Swal.showValidationMessage('Sila tulis sekurang-kurangnya sedikit penjelasan.');
                return false;
            }
            return text;
        }
    }).then(async (result) => {
        if (result.isConfirmed) {
            const userText = result.value;
            
            // --- LOGIK AI ANALISIS (SENTIMENT ENGINE) ---
            const analysis = analyzeStressWithAI(userText);
            
            Swal.fire({ 
                title: 'AI sedang menganalisis...', 
                html: 'Mengenal pasti emosi dan tekanan dalam teks...',
                allowOutsideClick: false, 
                didOpen: () => Swal.showLoading() 
            });

            try {
                // Simpan data ke Firestore untuk SV lihat
                const assessmentData = {
                    studentID: activeID,
                    studentName: currentUserData.name,
                    feedbackText: userText, // Teks asal pelajar
                    riskLevel: analysis.level, // NORMAL, MEDIUM, CRITICAL
                    aiAdvice: analysis.advice, // Nasihat automatik AI
                    timestamp: serverTimestamp(),
                    supervisorEmail: currentUserData.supervisorEmail || "tiada"
                };

                await setDoc(doc(db, "assessments", activeID), assessmentData);
                
                // Update profil user
                await updateDoc(doc(db, "users", activeID), { 
                    psikoStatus: 'done',
                    stressLevel: analysis.level 
                });

                Swal.fire({
                    icon: analysis.icon,
                    title: `Analisis AI: ${analysis.level}`,
                    html: `<div class="text-start small">
                            <b>Nasihat AI:</b><br>${analysis.advice}
                           </div>`,
                    confirmButtonText: 'Faham'
                }).then(() => location.reload());

            } catch (e) {
                Swal.fire('Ralat', 'Gagal memproses data.', 'error');
            }
        }
    });
};

// --- ENGINE ANALISIS AI (KEYWORD SCORING) ---
function analyzeStressWithAI(text) {
    const input = text.toLowerCase();
    
    // Kamus Kata Kunci
    const criticalWords = ['putus asa', 'gagal', 'benci', 'mati', 'depress', 'menangis', 'tekanan melampau', 'tak tahan', 'drop out', 'berhenti'];
    const mediumWords = ['susah', 'pening', 'stres', 'banyak kerja', 'letih', 'penat', 'tak faham', 'lambat', 'risau', 'takut'];

    let score = 0;
    
    // Kira skor berdasarkan perkataan
    criticalWords.forEach(w => { if(input.includes(w)) score += 5; });
    mediumWords.forEach(w => { if(input.includes(w)) score += 2; });

    // Tentukan Tahap & Nasihat
    if (score >= 10 || input.length > 300 && score >= 5) {
        return {
            level: 'CRITICAL',
            icon: 'error',
            advice: 'Anda menunjukkan tanda tekanan tinggi. Kami telah memaklumkan penyelia anda untuk sesi perjumpaan segera. Sila bertenang.',
            color: '#ef4444'
        };
    } else if (score >= 4) {
        return {
            level: 'MEDIUM',
            icon: 'warning',
            advice: 'Anda mungkin sedikit terbeban. Cuba susun jadual semula dan berbincang dengan rakan sekuliah atau penyelia.',
            color: '#f59e0b'
        };
    } else {
        return {
            level: 'NORMAL',
            icon: 'success',
            advice: 'Tahap emosi anda stabil. Teruskan usaha dan kekal fokus dalam pembelajaran anda!',
            color: '#10b981'
        };
    }
}
        });
    };

    window.logout = () => { sessionStorage.clear(); window.location.href = "index.html"; };
    initDashboard();
</script>
</body>
</html>
