<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content=device-width, initial-scale=1.0">
    <title>Dashboard Supervisor | EduGuard AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #dbeafe, #e0f2fe);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .dash-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .alert-high {
            background:#fee2e2 !important;
            color: #b91c1c !important;
            font-weight:700;
        }

        .navbar {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

<nav class="navbar px-4 py-3 shadow-sm mb-4">
    <h4 class="m-0 fw-bold text-primary">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard Supervisor
    </h4>
</nav>

<div class="container">

    <!-- Statistik -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="dash-card">
                <h6 class="text-muted">Jumlah Pelajar</h6>
                <h2 id="countStudents" class="fw-bold">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="dash-card">
                <h6 class="text-muted">Stress Tinggi (4–5)</h6>
                <h2 id="countHighStress" class="fw-bold text-danger">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="dash-card">
                <h6 class="text-muted">Beban Kerja Tinggi (4–5)</h6>
                <h2 id="countHighLoad" class="fw-bold text-warning">0</h2>
            </div>
        </div>
    </div>

    <!-- Graph -->
    <div class="dash-card mb-4">
        <h5 class="fw-bold mb-3">Graf Purata Kesejahteraan Pelajar</h5>
        <canvas id="wellnessChart" height="100"></canvas>
    </div>

    <!-- Table Real-time -->
    <div class="dash-card">
        <h5 class="fw-bold mb-3">Laporan Real-Time</h5>
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Nama</th>
                    <th>ID</th>
                    <th>Stress</th>
                    <th>Beban</th>
                    <th>Masa</th>
                </tr>
            </thead>
            <tbody id="assessmentTableBody"></tbody>
        </table>
    </div>

</div>

<audio id="notifAudio">
    <source src="https://notificationsounds.com/storage/sounds/file-sounds-1231-pristine.mp3" type="audio/mp3">
</audio>

<script type="module">
    // FIREBASE
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { 
        getFirestore, collection, query, where, orderBy, onSnapshot 
    } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Supervisor login (auto set dulu)
    let supervisorEmail = "sv@example.com";
    sessionStorage.setItem("svEmail", supervisorEmail);

    // UI elements
    const tableBody = document.getElementById("assessmentTableBody");
    const audioNotif = document.getElementById("notifAudio");

    const countStudents = document.getElementById("countStudents");
    const countHighStress = document.getElementById("countHighStress");
    const countHighLoad = document.getElementById("countHighLoad");

    // Chart Setup
    const ctx = document.getElementById("wellnessChart");
    const wellnessChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: "Stress",
                data: [],
                borderWidth: 3
            },{
                label: "Beban Kerja",
                data: [],
                borderWidth: 3
            }]
        }
    });

    // REAL-TIME LISTENER
    let firstLoad = true;
    const q = query(
        collection(db, "assessments"),
        where("supervisorEmail", "==", supervisorEmail),
        orderBy("timestamp", "desc")
    );

    onSnapshot(q, (snapshot) => {

        // Play sound when NEW DATA arrives
        if (!firstLoad) audioNotif.play();
        firstLoad = false;

        tableBody.innerHTML = "";

        let stressHigh = 0;
        let loadHigh = 0;
        let studentSet = new Set();

        let stressAvgArray = [];
        let loadAvgArray = [];
        let labelsArray = [];

        snapshot.forEach((doc) => {
            const d = doc.data();

            studentSet.add(d.studentID);

            if (d.stress >= 4) stressHigh++;
            if (d.load >= 4) loadHigh++;

            stressAvgArray.push(d.stress);
            loadAvgArray.push(d.load);
            labelsArray.push(d.timestamp.toDate().toLocaleTimeString());

            tableBody.innerHTML += `
                <tr class="${d.stress >= 4 ? 'alert-high' : ''}">
                    <td>${d.studentName}</td>
                    <td>${d.studentID}</td>
                    <td>${d.stress}</td>
                    <td>${d.load}</td>
                    <td>${d.timestamp.toDate().toLocaleString()}</td>
                </tr>
            `;
        });

        countStudents.innerText = studentSet.size;
        countHighStress.innerText = stressHigh;
        countHighLoad.innerText = loadHigh;

        // Update chart
        wellnessChart.data.labels = labelsArray.reverse();
        wellnessChart.data.datasets[0].data = stressAvgArray.reverse();
        wellnessChart.data.datasets[1].data = loadAvgArray.reverse();
        wellnessChart.update();
    });
</script>

</body>
</html>
