<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Portal Pelajar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { background: #f0f2f5; font-family: 'Plus Jakarta Sans', sans-serif; padding-top: 70px; }
        .student-header { background: linear-gradient(135deg, #4361ee, #4cc9f0); color: white; padding: 40px 0; border-radius: 0 0 40px 40px; }
        .portal-card { border: none; border-radius: 24px; padding: 30px; background: white; box-shadow: 0 15px 35px rgba(0,0,0,0.05); transition: 0.3s; }
        .portal-card:hover { transform: translateY(-5px); }
        .badge-val { background: #eef2ff; color: #4361ee; font-weight: bold; border-radius: 8px; padding: 5px 12px; }
        .grade-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .bg-grade-a { background: #dcfce7; color: #166534; }
        .bg-grade-g { background: #fee2e2; color: #991b1b; }
        .nav-pills .nav-link { border-radius: 12px; font-weight: 600; color: #64748b; background: white; margin: 0 5px; border: 1px solid #e2e8f0; }
        .nav-pills .nav-link.active { background: #4361ee; color: white; border-color: #4361ee; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="#"><i class="bi bi-shield-check"></i> EduGuard <span class="text-warning">AI</span></a>
    </div>
</nav>

<div id="verifySection" class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="portal-card text-center">
                <i class="bi bi-person-badge fs-1 text-primary mb-3"></i>
                <h4 class="fw-bold">Pengesahan Pelajar</h4>
                <p class="text-muted small">Sila masukkan ID Pelajar anda untuk memulakan.</p>
                <input type="text" id="verifyID" class="form-control form-control-lg text-center mb-3" placeholder="Contoh: ST123">
                <button class="btn btn-primary w-100 py-3 fw-bold" onclick="verifyStudent()">Sahkan ID & Masuk</button>
            </div>
        </div>
    </div>
</div>

<div id="mainPortal" class="d-none">
    <div class="student-header text-center">
        <div class="container">
            <h2 class="fw-bold">Selamat Datang, <span id="userDisplayName">-</span></h2>
            <p class="opacity-75">ID: <span id="userDisplayID">-</span> | SV Utama: <span id="userDisplaySV">-</span></p>
        </div>
    </div>

    <div class="container mt-5">
        <ul class="nav nav-pills justify-content-center mb-5" id="pills-tab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#content-results">Keputusan</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#content-materials">Bahan & Info</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#content-register">Daftar Kursus</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#content-assessment">Penilaian</button>
            </li>
        </ul>

        <div class="tab-content pb-5">
            <div class="tab-pane fade show active" id="content-results">
                <div class="row justify-content-center">
                    <div class="col-md-8" id="resultsList">
                        <p class="text-center text-muted">Tiada data dijumpai.</p>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="content-materials">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="d-flex align-items-center mb-4">
                            <i class="bi bi-folder2-open fs-3 text-primary me-2"></i>
                            <h4 class="fw-bold mb-0">Pusat Sumber & Makluman</h4>
                        </div>
                        <div id="materialsDisplay">
                            <p class="text-center text-muted">Memuatkan bahan...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="content-register">
                <div class="row justify-content-center">
                    <div class="col-md-7">
                        <div class="portal-card">
                            <h4 class="fw-bold mb-4">Daftar Subjek Baru</h4>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Pilih Kursus</label>
                                <select id="newCourse" class="form-select">
                                    <option value="Software Engineering">Software Engineering</option>
                                    <option value="IoT Systems">IoT Systems</option>
                                    <option value="Data Analytics">Data Analytics</option>
                                    <option value="Artificial Intelligence">Artificial Intelligence</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Semester</label>
                                <select id="newSemester" class="form-select">
                                    <option value="Semester 1">Semester 1</option>
                                    <option value="Semester 2">Semester 2</option>
                                    <option value="Semester 3">Semester 3</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Pilih Supervisor (SV)</label>
                                <select id="newSupervisor" class="form-select">
                                    <option value="">Memuatkan SV...</option>
                                </select>
                            </div>
                            <button class="btn btn-success w-100 py-3 fw-bold shadow-sm" onclick="registerNewCourse()">
                                <i class="bi bi-plus-circle me-2"></i>Sahkan Pendaftaran
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="content-assessment">
                <div class="row justify-content-center">
                    <div class="col-md-7">
                        <div class="portal-card">
                            <h4 class="fw-bold mb-4">Borang Penilaian Harian</h4>
                            <div class="mb-4">
                                <div class="d-flex justify-content-between"><label>Tahap Stress</label><span id="stressVal" class="badge-val">3</span></div>
                                <input type="range" class="form-range" min="1" max="5" id="stress" value="3" oninput="document.getElementById('stressVal').innerText=this.value">
                            </div>
                            <div class="mb-4">
                                <div class="d-flex justify-content-between"><label>Beban Belajar</label><span id="loadVal" class="badge-val">3</span></div>
                                <input type="range" class="form-range" min="1" max="5" id="load" value="3" oninput="document.getElementById('loadVal').innerText=this.value">
                            </div>
                            <button class="btn btn-primary w-100 py-3 fw-bold" onclick="submitAssessment()">Hantar Penilaian</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="announcementModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-header bg-warning text-dark border-0" style="border-radius: 20px 20px 0 0;">
                <h5 class="modal-title fw-bold"><i class="bi bi-exclamation-triangle-fill me-2"></i> Peringatan Penting!</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4" id="modalAlertContent"></div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light fw-bold" data-bs-dismiss="modal">Faham</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, setDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let activeStudent = null;

    // --- 1. VERIFIKASI ID ---
    window.verifyStudent = async function() {
        const id = document.getElementById('verifyID').value.trim();
        if(!id) return alert("Sila masukkan ID!");

        try {
            const q = query(collection(db, "course_registrations"), where("studentID", "==", id));
            const snap = await getDocs(q);

            if(snap.empty) return alert("ID Pelajar tidak dijumpai!");

            activeStudent = snap.docs[0].data();

            document.getElementById('verifySection').classList.add('d-none');
            document.getElementById('mainPortal').classList.remove('d-none');
            
            document.getElementById('userDisplayName').innerText = activeStudent.studentName;
            document.getElementById('userDisplayID').innerText = activeStudent.studentID;
            document.getElementById('userDisplaySV').innerText = activeStudent.supervisorEmail;

            loadResults(id);
            loadAutoMaterials(id);
            fetchSVList();
        } catch (e) { console.error(e); }
    }

    // --- 2. LOAD KEPUTUSAN ---
    async function loadResults(id) {
        const list = document.getElementById('resultsList');
        list.innerHTML = "";
        const q = query(collection(db, "course_registrations"), where("studentID", "==", id));
        const snap = await getDocs(q);

        snap.forEach(doc => {
            const data = doc.data();
            let gradeClass = data.grade === 'A' ? 'bg-grade-a' : (data.grade === 'G' ? 'bg-grade-g' : 'bg-light');
            list.innerHTML += `
                <div class="card portal-card mb-3 border-start border-4 ${data.status === 'High Risk' ? 'border-danger' : 'border-success'}">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="fw-bold mb-1">${data.course}</h6>
                            <p class="small text-muted mb-0">Quiz: ${data.quiz}% | Test: ${data.test}%</p>
                        </div>
                        <div class="grade-circle ${gradeClass} shadow-sm">${data.grade || '-'}</div>
                    </div>
                </div>`;
        });
    }

    // --- 3. LOAD BAHAN (AUTO FILTER) ---
    async function loadAutoMaterials(studentID) {
        const display = document.getElementById('materialsDisplay');
        display.innerHTML = '<div class="text-center p-4"><div class="spinner-border text-primary spinner-border-sm"></div></div>';

        try {
            const qReg = query(collection(db, "course_registrations"), where("studentID", "==", studentID));
            const snapReg = await getDocs(qReg);
            let registeredCourses = snapReg.docs.map(doc => doc.data().course);

            const snapMat = await getDocs(collection(db, "materials"));
            display.innerHTML = "";
            let alertHTML = "";

            snapMat.forEach(doc => {
                const m = doc.data();
                if (registeredCourses.includes(m.course)) {
                    const icon = m.category === 'Nota' ? 'bi-file-earmark-text' : (m.category === 'Kuiz' ? 'bi-controller' : 'bi-calendar-check');
                    
                    display.innerHTML += `
                        <div class="card portal-card mb-3 border-start border-4 ${m.category === 'Tarikh Penting' ? 'border-warning' : 'border-primary'}">
                            <div class="card-body p-0">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <span class="badge ${m.category === 'Tarikh Penting' ? 'bg-warning text-dark' : 'bg-primary-subtle text-primary'} mb-2">${m.course}</span>
                                        <h6 class="fw-bold mb-1">${m.title}</h6>
                                        <p class="small text-muted mb-0">${m.content}</p>
                                    </div>
                                    <i class="bi ${icon} fs-4 text-secondary"></i>
                                </div>
                            </div>
                        </div>`;

                    if (m.category === 'Tarikh Penting') {
                        alertHTML += `<div class="mb-2 p-2 bg-light rounded border-start border-warning border-3">
                            <small class="fw-bold text-warning">${m.course}</small><br>
                            <strong>${m.title}</strong>
                        </div>`;
                    }
                }
            });

            if (alertHTML) {
                document.getElementById('modalAlertContent').innerHTML = alertHTML;
                new bootstrap.Modal(document.getElementById('announcementModal')).show();
            }
            if (!display.innerHTML) display.innerHTML = '<p class="text-center text-muted">Tiada bahan subjek dijumpai.</p>';
        } catch (e) { console.error(e); }
    }

    // --- 4. LAIN-LAIN FUNGSI (SV & DAFTAR) ---
    async function fetchSVList() {
        const svSelect = document.getElementById('newSupervisor');
        const snap = await getDocs(query(collection(db, "users"), where("role", "==", "supervisor")));
        svSelect.innerHTML = '<option value="">-- Pilih Supervisor --</option>';
        snap.forEach(doc => {
            const sv = doc.data();
            svSelect.innerHTML += `<option value="${sv.email}">${sv.name}</option>`;
        });
    }

    window.registerNewCourse = async function() {
        const course = document.getElementById('newCourse').value;
        const svEmail = document.getElementById('newSupervisor').value;
        if(!svEmail) return alert("Pilih SV!");
        const regID = `${activeStudent.studentID}_${course.replace(/\s+/g, '')}`;
        try {
            await setDoc(doc(db, "course_registrations", regID), {
                studentID: activeStudent.studentID, studentName: activeStudent.studentName,
                course: course, supervisorEmail: svEmail, grade: "-", status: "Normal", timestamp: serverTimestamp()
            });
            alert("Berjaya!");
            loadResults(activeStudent.studentID);
            loadAutoMaterials(activeStudent.studentID);
        } catch (e) { alert("Ralat."); }
    }

    window.submitAssessment = async function() {
        const s = parseInt(document.getElementById('stress').value);
        const l = parseInt(document.getElementById('load').value);
        try {
            await addDoc(collection(db, "assessments"), {
                studentID: activeStudent.studentID, studentName: activeStudent.studentName,
                supervisorEmail: activeStudent.supervisorEmail, stress: s, load: l, timestamp: serverTimestamp()
            });
            alert("Hantar!");
        } catch (e) { alert("Gagal."); }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
