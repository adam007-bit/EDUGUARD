<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Portal Pelajar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; }
        .student-header { background: linear-gradient(135deg, #4361ee, #4cc9f0); color: white; padding: 40px 0; border-radius: 0 0 30px 30px; }
        .result-card { border: none; border-radius: 20px; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .grade-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        .bg-grade-a { background: #dcfce7; color: #166534; }
        .bg-grade-g { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="student-header text-center mb-4">
    <div class="container">
        <h2 class="fw-bold">EduGuard <span class="text-warning">AI</span></h2>
        <p class="mb-0">Portal Semakan Keputusan Pelajar</p>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card result-card p-4 mb-4">
                <label class="form-label fw-bold">Masukkan ID Pelajar untuk Semakan:</label>
                <div class="input-group">
                    <input type="text" id="inputStudentID" class="form-control form-control-lg" placeholder="Contoh: ST12345">
                    <button class="btn btn-primary px-4" onclick="checkResults()"><i class="bi bi-search"></i> Semak</button>
                </div>
            </div>

            <div id="studentProfile" class="d-none">
                <div class="d-flex align-items-center mb-3">
                    <div class="bg-white p-3 rounded-circle shadow-sm me-3">
                        <i class="bi bi-person-fill fs-2 text-primary"></i>
                    </div>
                    <div>
                        <h4 class="fw-bold mb-0" id="dispStudentName">-</h4>
                        <p class="text-muted mb-0" id="dispStudentID">-</p>
                    </div>
                </div>

                <div id="resultsList">
                    </div>
            </div>

            <div id="noDataMsg" class="alert alert-info d-none text-center">
                Maaf, tiada rekod ditemui untuk ID tersebut. Sila pastikan ID adalah betul.
            </div>
        </div>
    </div>
</div>

<script type="module" src="student.js"></script>
</body>
</html>
