<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Dashboard Pelajar</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary: #4361ee;
            --bg: #f8fafc;
        }
        body { 
            background-color: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #1e293b;
        }
        .navbar { background: white; border-bottom: 1px solid #e2e8f0; }
        .welcome-section {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            padding: 60px 0;
            border-radius: 0 0 40px 40px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border: none;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .grade-badge {
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-weight: 800; font-size: 1.2rem;
        }
        .bg-pending { background: #fef3c7; color: #92400e; }
        .bg-complete { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<nav class="navbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="#"><i class="bi bi-shield-check-fill me-2"></i>EduGuard AI</a>
        <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="logout()">
            <i class="bi bi-power me-1"></i> Keluar
        </button>
    </div>
</nav>

<div class="welcome-section text-center">
    <div class="container">
        <h2 class="fw-bold mb-1">Selamat Datang, <span id="studentName">...</span></h2>
        <p class="text-white-50 small">ID: <span id="studentID">...</span></p>
    </div>
</div>

<div class="container mb-5">
    <div class="row g-4">
        <div class="col-12">
            <h5 class="fw-bold mb-3"><i class="bi bi-journal-text me-2"></i>Kursus Anda</h5>
            <div id="courseContainer" class="row g-3">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Ambil data dari localStorage
    const currentID = localStorage.getItem("currentStudentID");
    const currentName = localStorage.getItem("currentStudentName");

    if (!currentID) {
        window.location.href = "index.html";
    }

    document.getElementById('studentName').innerText = currentName;
    document.getElementById('studentID').innerText = currentID;

    async function loadStudentCourses() {
        const container = document.getElementById('courseContainer');
        try {
            const q = query(collection(db, "course_registrations"), where("studentID", "==", currentID));
            const snap = await getDocs(q);

            if (snap.empty) {
                container.innerHTML = '<div class="col-12"><div class="stat-card text-center text-muted">Tiada kursus terdaftar.</div></div>';
                return;
            }

            container.innerHTML = '';
            snap.forEach(doc => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="col-md-6">
                        <div class="stat-card d-flex justify-content-between align-items-center">
                            <div>
                                <span class="badge bg-primary mb-2">${data.semester}</span>
                                <h6 class="fw-bold mb-1">${data.course}</h6>
                                <p class="small text-muted mb-0"><i class="bi bi-person-badge me-1"></i> SV: ${data.supervisorEmail}</p>
                            </div>
                            <div class="text-center">
                                <div class="grade-badge ${data.grade === '-' ? 'bg-pending' : 'bg-complete'} mb-1">
                                    ${data.grade}
                                </div>
                                <div style="font-size: 0.7rem; font-weight: bold;">MARK: ${data.totalMark}%</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        } catch (e) {
            console.error(e);
            container.innerHTML = '<p class="text-danger text-center">Gagal memuatkan data.</p>';
        }
    }

    window.logout = () => {
        localStorage.clear();
        window.location.href = "index.html";
    };

    loadStudentCourses();
</script>

</body>
</html>
