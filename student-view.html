<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Dashboard Pelajar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --p-blue: #4361ee; --bg-light: #f8fafc; }
        body { background: var(--bg-light); font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; }
        .nav-custom { background: white; border-bottom: 1px solid #e2e8f0; padding: 12px 0; position: sticky; top: 0; z-index: 1000; }
        .header-box { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; padding: 50px 0; border-radius: 0 0 40px 40px; margin-bottom: 40px; }
        .glass-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; padding: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); transition: 0.3s; }
        .material-card { border-left: 5px solid var(--p-blue); background: #ffffff; border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid #edf2f7; }
        .grade-circle { width: 55px; height: 55px; background: #eff6ff; color: var(--p-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; }
        .section-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; }
        .section-title i { color: var(--p-blue); margin-right: 12px; }
        .text-critical { color: #ef4444; }
        .text-medium { color: #f59e0b; }
        .text-normal { color: #10b981; }
    </style>
</head>
<body>

<nav class="navbar nav-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand fw-bold text-primary"><i class="bi bi-shield-check-fill me-2"></i>EduGuard AI</span>
        <div class="d-flex gap-2">
            <button class="btn btn-primary btn-sm rounded-pill px-4" onclick="window.location.href='register_course.html'">Daftar Kursus</button>
            <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
        </div>
    </div>
</nav>

<div class="header-box text-center shadow-sm">
    <div class="container animate__animated animate__fadeIn">
        <h2 class="fw-bold mb-1">Selamat Datang, <span id="studentNameDisplay" class="text-warning">...</span></h2>
        <p class="opacity-75 small mb-0">ID: <span id="studentIDDisplay">...</span></p>
    </div>
</div>

<div class="container pb-5">
    <div class="row g-4">
        <div class="col-lg-7">
            <h5 class="section-title"><i class="bi bi-grid-fill"></i> Ringkasan Akademik</h5>
            <div id="courseList">
                <div class="text-center py-5 text-muted"><div class="spinner-border text-primary spinner-border-sm"></div></div>
            </div>

            <h5 class="section-title mt-5"><i class="bi bi-heart-pulse-fill"></i> Saringan Emosi AI</h5>
            <div class="glass-card animate__animated animate__fadeInUp">
                <div id="stressResultArea" class="mb-4 d-none p-3 bg-light rounded-4 border border-dashed">
                    <h5 id="stressLevelLabel" class="fw-bold mb-0">...</h5>
                </div>
                <button class="btn btn-dark w-100 fw-bold py-3 rounded-4" id="btnPsiko" onclick="openPsiko()">MULA ANALISIS AI</button>
            </div>
        </div>

        <div class="col-lg-5">
            <h5 class="section-title"><i class="bi bi-collection-play-fill"></i> Bahan & Nota</h5>
            <div id="materialList">
                <div class="text-center py-5 bg-white rounded-4">Daftar kursus untuk nota.</div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { 
        getFirestore, doc, getDoc, updateDoc, setDoc, 
        collection, query, where, getDocs, serverTimestamp, onSnapshot 
    } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const activeID = sessionStorage.getItem("activeUser");

    if (!activeID) window.location.href = "index.html";
    let currentUserData = null;

    // 1. Notifikasi Live
    function listenNotifications() {
        const q = query(collection(db, "notifications"), where("studentID", "==", activeID), where("status", "==", "unread"));
        onSnapshot(q, (snaps) => {
            snaps.docChanges().forEach(async (change) => {
                if (change.type === "added") {
                    const d = change.doc.data();
                    await Swal.fire({ title: '📧 Pesanan Kaunselor', text: d.message, icon: 'info' });
                    await updateDoc(doc(db, "notifications", change.doc.id), { status: "read" });
                }
            });
        });
    }

    // 2. Data Akademik
    async function loadAcademicData() {
        const cList = document.getElementById('courseList');
        const mList = document.getElementById('materialList');
        const q = query(collection(db, "course_registrations"), where("studentID", "==", activeID));
        const snap = await getDocs(q);

        if (snap.empty) { cList.innerHTML = "Tiada kursus."; return; }
        cList.innerHTML = '';
        let courses = [];

        snap.forEach(d => {
            const data = d.data();
            courses.push(data.course);
            cList.innerHTML += `
                <div class="glass-card mb-3 d-flex align-items-center justify-content-between">
                    <div><h6 class="fw-bold mb-0">${data.course}</h6><small>${data.status}</small></div>
                    <div class="grade-circle shadow-sm">${data.grade || '-'}</div>
                </div>`;
        });

        if (courses.length > 0) {
            const mq = query(collection(db, "materials"), where("course", "in", courses.slice(0, 10)));
            const mSnap = await getDocs(mq);
            mList.innerHTML = '';
            mSnap.forEach(mdoc => {
                const m = mdoc.data();
                mList.innerHTML += `<div class="material-card"><h6 class="fw-bold">${m.title}</h6><a href="${m.content}" target="_blank" class="btn btn-sm btn-primary w-100">Buka</a></div>`;
            });
        }
    }

    // 3. Analisis Psikometrik
    window.openPsiko = async () => {
        const questions = [
            "Adakah anda merasa tertekan dengan tugasan?",
            "Adakah anda sukar tidur kerana pelajaran?",
            "Adakah anda hilang motivasi?",
            "Adakah bimbang akan gagal?",
            "Tiada tempat mengadu masalah?"
        ];
        let score = 0;
        for (let i = 0; i < questions.length; i++) {
            const { value: a } = await Swal.fire({
                title: `Soalan ${i+1}/5`, text: questions[i], input: 'radio',
                inputOptions: { '0': 'Tidak', '1': 'Jarang', '2': 'Kerap', '3': 'Sangat Kerap' },
                inputValidator: (v) => !v && 'Pilih jawapan!'
            });
            if (a) score += parseInt(a); else return;
        }

        let level = score >= 11 ? 'CRITICAL' : score >= 6 ? 'MEDIUM' : 'NORMAL';
        await setDoc(doc(db, "assessments", activeID), { studentID: activeID, studentName: currentUserData.name, score, riskLevel: level, timestamp: serverTimestamp() });
        await updateDoc(doc(db, "users", activeID), { psikoStatus: 'done', stressLevel: level });
        location.reload();
    };

    // 4. Init
    async function init() {
        const u = await getDoc(doc(db, "users", activeID));
        if (u.exists()) {
            currentUserData = u.data();
            document.getElementById('studentNameDisplay').innerText = currentUserData.name;
            document.getElementById('studentIDDisplay').innerText = activeID;
            if (currentUserData.psikoStatus === 'done') {
                document.getElementById('stressResultArea').classList.remove('d-none');
                document.getElementById('stressLevelLabel').innerText = "TAHAP: " + currentUserData.stressLevel;
            }
        }
        loadAcademicData();
        listenNotifications();
    }

    window.logout = () => { sessionStorage.clear(); window.location.href = "index.html"; };
    init();
</script>
</body>
</html>
