<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Dashboard Pelajar</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .nav-custom { background: white; border-bottom: 1px solid #e2e8f0; padding: 15px 0; }
        .header-box { background: #1e293b; color: white; padding: 45px 0; border-radius: 0 0 30px 30px; margin-bottom: 30px; }
        .course-card { background: white; border-radius: 20px; padding: 25px; border: 1px solid #e2e8f0; transition: 0.3s; height: 100%; }
        .course-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .grade-circle { width: 60px; height: 60px; background: #eff6ff; color: #2563eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.3rem; margin-bottom: 10px; }
        .logout-btn { border-radius: 12px; font-weight: 600; }
    </style>
</head>
<body>

<nav class="navbar nav-custom">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand fw-bold text-primary"><i class="bi bi-shield-check-fill me-2"></i>EduGuard AI</span>
        <button class="btn btn-outline-danger btn-sm logout-btn px-3" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i> Keluar</button>
    </div>
</nav>

<div class="header-box text-center">
    <div class="container">
        <h2 class="fw-bold mb-1">Selamat Datang, <span id="studentNameDisplay" class="text-warning">...</span></h2>
        <p class="opacity-50 small mb-0">No. ID: <span id="studentIDDisplay">...</span></p>
    </div>
</div>

<div class="container">
    <div class="row mb-4">
        <div class="col-12">
            <h5 class="fw-bold"><i class="bi bi-grid-1x2-fill me-2 text-primary"></i>Status Pengajian</h5>
        </div>
    </div>
    
    <div id="courseList" class="row g-4">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary"></div>
            <p class="mt-2 text-muted small">Memuatkan maklumat anda...</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const activeID = sessionStorage.getItem("activeUser");

    // Keselamatan: Jika tiada sesi, tendang balik ke login
    if (!activeID) {
        window.location.href = "index.html";
    }

    async function loadDashboard() {
        const listContainer = document.getElementById('courseList');
        try {
            // 1. Ambil Nama User
            const userSnap = await getDoc(doc(db, "users", activeID));
            if (userSnap.exists()) {
                document.getElementById('studentNameDisplay').innerText = userSnap.data().name;
                document.getElementById('studentIDDisplay').innerText = activeID;
            }

            // 2. Ambil Data Kursus
            const q = query(collection(db, "course_registrations"), where("studentID", "==", activeID));
            const snap = await getDocs(q);
            
            listContainer.innerHTML = '';
            if (snap.empty) {
                listContainer.innerHTML = '<div class="col-12 text-center text-muted">Tiada data kursus ditemui.</div>';
                return;
            }

            snap.forEach((doc) => {
                const data = doc.data();
                listContainer.innerHTML += `
                    <div class="col-md-6">
                        <div class="course-card d-flex align-items-center justify-content-between">
                            <div>
                                <h5 class="fw-bold mb-1">${data.course}</h5>
                                <p class="small text-muted mb-3"><i class="bi bi-person-badge me-1"></i> Penyelia: ${data.supervisorEmail}</p>
                                <span class="badge ${data.status === 'Pending' ? 'bg-warning' : 'bg-success'} rounded-pill px-3 py-2">
                                    Status: ${data.status}
                                </span>
                            </div>
                            <div class="text-center">
                                <div class="grade-circle mx-auto">${data.grade}</div>
                                <div class="fw-bold text-primary">${data.totalMark}%</div>
                                <div class="small text-muted">Jumlah Markah</div>
                            </div>
                        </div>
                    </div>`;
            });
        } catch (e) { listContainer.innerHTML = '<p class="text-danger">Gagal memuatkan data dari Firebase.</p>'; }
    }

    window.logout = () => {
        sessionStorage.clear();
        window.location.href = "index.html";
    };

    loadDashboard();
</script>
</body>
</html>
