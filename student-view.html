<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Dashboard Pelajar</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-blue: #2563eb;
            --dark-navy: #1e293b;
        }
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .nav-custom { background: white; border-bottom: 1px solid #e2e8f0; }
        
        .header-box { 
            background: var(--dark-navy); 
            color: white; 
            padding: 50px 0; 
            border-radius: 0 0 40px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .course-card { 
            background: white; 
            border-radius: 20px; 
            padding: 24px; 
            border: 1px solid #f1f5f9; 
            transition: all 0.3s ease;
            height: 100%;
        }
        .course-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); 
        }

        .bg-soft-primary {
            background-color: #eff6ff;
            color: var(--primary-blue);
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: 600;
        }

        .grade-circle { 
            width: 60px; 
            height: 60px; 
            background: #f0f7ff; 
            color: var(--primary-blue); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 800; 
            font-size: 1.3rem;
            border: 2px solid #dbeafe;
        }

        .logout-btn {
            font-weight: 600;
            padding: 8px 20px;
            transition: 0.2s;
        }
    </style>
</head>
<body>

<nav class="navbar nav-custom px-4 py-3">
    <a class="navbar-brand fw-bold text-primary d-flex align-items-center" href="#">
        <i class="bi bi-shield-check-fill me-2 fs-4"></i>EduGuard AI
    </a>
    <button class="btn btn-outline-danger btn-sm rounded-pill logout-btn" onclick="logout()">
        <i class="bi bi-box-arrow-right me-1"></i> Log Keluar
    </button>
</nav>

<div class="header-box text-center">
    <div class="container">
        <div class="mb-3">
            <i class="bi bi-person-circle fs-1 opacity-50"></i>
        </div>
        <h2 class="fw-bold mb-1">Hai, <span id="studentNameDisplay">Pelajar</span></h2>
        <p class="text-white-50 mb-0">ID: <span id="studentIDDisplay">...</span></p>
    </div>
</div>

<div class="container mt-5 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold text-secondary mb-0">MAKLUMAT KURSUS</h5>
        <span class="badge bg-success rounded-pill">Status: Aktif</span>
    </div>

    <div id="courseList" class="row g-4">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary"></div>
            <p class="text-muted mt-2">Memuatkan data dari Firebase...</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Ambil ID dari sesi aktif
    const activeID = sessionStorage.getItem("activeUser");

    // Jika tiada sesi, balik ke login
    if (!activeID) {
        window.location.href = "index.html";
    }

    async function initializeDashboard() {
        const list = document.getElementById('courseList');
        try {
            // 1. Ambil Nama Pelajar dari koleksi 'users'
            const userSnap = await getDoc(doc(db, "users", activeID));
            if (userSnap.exists()) {
                const userData = userSnap.data();
                document.getElementById('studentNameDisplay').innerText = userData.name;
                document.getElementById('studentIDDisplay').innerText = activeID;
            }

            // 2. Ambil Kursus dari koleksi 'course_registrations'
            const q = query(collection(db, "course_registrations"), where("studentID", "==", activeID));
            const querySnapshot = await getDocs(q);
            
            list.innerHTML = ''; // Kosongkan spinner

            if (querySnapshot.empty) {
                list.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="bi bi-clipboard-x fs-1 text-muted"></i>
                        <p class="text-muted mt-2">Anda belum mendaftar mana-mana kursus.</p>
                        <a href="registration-course.html" class="btn btn-primary btn-sm">Daftar Sekarang</a>
                    </div>`;
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="col-md-6">
                        <div class="course-card d-flex align-items-center justify-content-between">
                            <div>
                                <span class="bg-soft-primary small mb-3 d-inline-block text-uppercase">${data.semester}</span>
                                <h5 class="fw-bold mb-2 text-dark">${data.course}</h5>
                                <div class="small text-muted">
                                    <p class="mb-1"><i class="bi bi-person-badge me-2"></i>SV: ${data.supervisorEmail}</p>
                                    <p class="mb-0"><i class="bi bi-info-circle me-2"></i>Status: <span class="text-primary fw-bold">${data.status}</span></p>
                                </div>
                            </div>
                            <div class="text-center">
                                <div class="grade-circle mx-auto mb-2">${data.grade || '-'}</div>
                                <div class="fw-bold text-dark fs-5">${data.totalMark}%</div>
                                <div class="text-muted" style="font-size: 0.7rem;">MARKAH KESELURUHAN</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        } catch (e) {
            console.error(e);
            list.innerHTML = '<div class="alert alert-danger mx-auto">Ralat sistem: Gagal memuatkan maklumat dashboard.</div>';
        }
    }

    // Fungsi Logout
    window.logout = () => {
        sessionStorage.clear();
        window.location.href = "index.html";
    };

    // Jalankan fungsi
    initializeDashboard();
</script>

</body>
</html>
