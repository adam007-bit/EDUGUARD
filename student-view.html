<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Portal Pelajar Holistik</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary-neon: #4361ee;
            --accent-neon: #4cc9f0;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        body { 
            background: var(--bg-gradient); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            color: #1e293b;
        }

        .navbar {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.8) !important;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        #verifySection { height: 100vh; display: flex; align-items: center; }
        .verify-card {
            max-width: 450px; width: 100%;
            background: var(--glass-bg);
            border-radius: 30px; padding: 50px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
        }

        .verify-input {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem; text-align: center;
            border-radius: 16px; padding: 15px; border: 2px solid #e2e8f0;
        }

        .student-header { 
            background: linear-gradient(135deg, #1e293b, #334155); 
            color: white; padding: 110px 0 70px 0; 
            border-radius: 0 0 50px 50px;
        }

        .header-info {
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 20px; border-radius: 12px; font-size: 0.85rem;
        }

        .portal-card { 
            border: none; border-radius: 24px; padding: 25px; 
            background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.02); 
            margin-bottom: 20px; border: 1px solid #f1f5f9;
            transition: transform 0.2s;
        }
        
        .portal-card:hover { transform: translateY(-5px); }

        .grade-circle { 
            width: 55px; height: 55px; border-radius: 16px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 1.2rem;
        }

        .bg-grade-a { background: #dcfce7; color: #166534; }
        .bg-grade-g { background: #fee2e2; color: #991b1b; }

        .nav-pills { background: #fff; padding: 8px; border-radius: 20px; display: inline-flex; }
        .nav-pills .nav-link { border-radius: 15px; font-weight: 700; color: #64748b; padding: 10px 20px; }
        .nav-pills .nav-link.active { background: var(--primary-neon); color: white; }

        .q-box { border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 20px; }
        .form-check-label { font-size: 0.85rem; cursor: pointer; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="#">
            <i class="bi bi-shield-check-fill me-2"></i>EduGuard <span class="text-warning">AI</span>
        </a>
    </div>
</nav>

<div id="verifySection" class="container">
    <div class="row justify-content-center w-100 mx-0">
        <div class="verify-card text-center animate__animated animate__fadeIn">
            <h3 class="fw-bold mb-2">Portal Pelajar</h3>
            <p class="text-muted small mb-4">Sila masukkan ID anda untuk akses sistem.</p>
            <input type="text" id="verifyID" class="form-control verify-input mb-4" placeholder="ST123">
            <button class="btn btn-primary w-100 py-3 fw-bold rounded-4 shadow-sm" onclick="verifyStudent()">
                LOG MASUK <i class="bi bi-box-arrow-in-right ms-2"></i>
            </button>
        </div>
    </div>
</div>

<div id="mainPortal" class="d-none">
    <div class="student-header text-center">
        <div class="container">
            <h1 class="fw-bold mb-3"><span id="userDisplayName">-</span></h1>
            <div class="header-info d-inline-block">
                <span><i class="bi bi-hash me-1"></i> <span id="userDisplayID">ID</span></span>
                <span class="ms-3"><i class="bi bi-person-badge me-1"></i> <span id="userDisplaySV">SV</span></span>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <div class="text-center mb-5">
            <ul class="nav nav-pills shadow-sm" id="pills-tab">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#content-results">Keputusan</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#content-materials">Bahan</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#content-register">Daftar</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#content-assessment">Status Minda</button></li>
            </ul>
        </div>

        <div class="tab-content pb-5">
            <div class="tab-pane fade show active" id="content-results">
                <div class="row justify-content-center"><div class="col-md-8" id="resultsList"></div></div>
            </div>

            <div class="tab-pane fade" id="content-materials">
                <div class="row justify-content-center"><div class="col-md-8" id="materialsDisplay"></div></div>
            </div>

            <div class="tab-pane fade" id="content-register">
                <div class="row justify-content-center">
                    <div class="col-md-7">
                        <div class="portal-card">
                            <h5 class="fw-bold mb-4"><i class="bi bi-plus-circle me-2 text-primary"></i>Daftar Kursus Baru</h5>
                            <div class="mb-3">
                                <label class="small fw-bold text-muted mb-2">PILIH SUBJEK</label>
                                <select id="newCourse" class="form-select py-3 rounded-3">
                                    <option value="Software Engineering">Software Engineering</option>
                                    <option value="IoT Systems">IoT Systems</option>
                                    <option value="Data Analytics">Data Analytics</option>
                                    <option value="AI Solutions">AI Solutions</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="small fw-bold text-muted mb-2">PILIH PENYELIA (SV)</label>
                                <select id="newSupervisor" class="form-select py-3 rounded-3">
                                    <option value="">Memuatkan SV...</option>
                                </select>
                            </div>
                            <button id="btnReg" class="btn btn-primary w-100 py-3 fw-bold rounded-3 shadow" onclick="registerNewCourse()">
                                SAHKAN PENDAFTARAN
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="content-assessment">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="portal-card">
                            <h5 class="fw-bold text-center">Ujian Kesejahteraan Minda (DASS-Lite)</h5>
                            <p class="text-muted text-center small mb-4">Sila jawab dengan jujur untuk membantu SV memantau kesejahteraan anda.</p>
                            
                            <form id="assessmentForm">
                                <div class="q-box">
                                    <label class="fw-bold small mb-3 text-primary">1. Berapa kerap anda rasa tidak mampu mengawal perkara penting dalam hidup?</label>
                                    <div class="d-flex justify-content-between mt-2">
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q1" value="0" required><label class="form-check-label">Tiada</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q1" value="1"><label class="form-check-label">Jarang</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q1" value="2"><label class="form-check-label">Kerap</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q1" value="3"><label class="form-check-label">Sangat Kerap</label></div>
                                    </div>
                                </div>

                                <div class="q-box">
                                    <label class="fw-bold small mb-3 text-primary">2. Adakah anda merasa tertekan dengan tugasan akademik (projek/exam)?</label>
                                    <div class="d-flex justify-content-between mt-2">
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q2" value="0" required><label class="form-check-label">Tiada</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q2" value="1"><label class="form-check-label">Jarang</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q2" value="2"><label class="form-check-label">Kerap</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q2" value="3"><label class="form-check-label">Sangat Kerap</label></div>
                                    </div>
                                </div>

                                <div class="q-box">
                                    <label class="fw-bold small mb-3 text-primary">3. Adakah anda hilang minat untuk bergaul atau melakukan hobi?</label>
                                    <div class="d-flex justify-content-between mt-2">
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q3" value="0" required><label class="form-check-label">Tidak</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q3" value="1"><label class="form-check-label">Sedikit</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q3" value="2"><label class="form-check-label">Banyak</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q3" value="3"><label class="form-check-label">Sangat Banyak</label></div>
                                    </div>
                                </div>

                                <div class="q-box">
                                    <label class="fw-bold small mb-3 text-primary">4. Adakah anda mengalami gangguan tidur (insomnia/berlebihan)?</label>
                                    <div class="d-flex justify-content-between mt-2">
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q4" value="0" required><label class="form-check-label">Tiada</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q4" value="1"><label class="form-check-label">1-2 Hari</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q4" value="2"><label class="form-check-label">3-4 Hari</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q4" value="3"><label class="form-check-label">Hampir Setiap Hari</label></div>
                                    </div>
                                </div>

                                <div class="q-box border-0">
                                    <label class="fw-bold small mb-3 text-primary">5. Adakah anda rasa bimbang tentang masa depan anda secara melampau?</label>
                                    <div class="d-flex justify-content-between mt-2">
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q5" value="0" required><label class="form-check-label">Tiada</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q5" value="1"><label class="form-check-label">Jarang</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q5" value="2"><label class="form-check-label">Kerap</label></div>
                                        <div class="form-check"><input class="form-check-input" type="radio" name="q5" value="3"><label class="form-check-label">Sangat Kerap</label></div>
                                    </div>
                                </div>

                                <button type="button" class="btn btn-dark w-100 py-3 fw-bold rounded-3 shadow" onclick="submitAssessment()">
                                    HANTAR PENILAIAN <i class="bi bi-heart-pulse-fill ms-2"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, setDoc, getDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let activeStudent = null;
window.verifyStudent = async function() {
    const idInput = document.getElementById('verifyID').value.trim();
    if(!idInput) return Swal.fire('Info', 'Sila masukkan ID Pelajar!', 'info');

    Swal.fire({ title: 'Menyemak ID...', didOpen: () => Swal.showLoading() });

    try {
        // SEMAK DALAM KOLEKSI "users" (Sebab di sini data pendaftaran asal disimpan)
        // Kita cari dokumen di mana field "role" adalah "student" DAN (ini bergantung pada cara anda simpan ID)
        // Jika anda simpan ID dalam field 'email' atau 'name', sesuaikan query di bawah:
        
        const q = query(collection(db, "users"), where("role", "==", "student"));
        const snap = await getDocs(q);
        
        let foundUser = null;
        
        // Cari user yang mempunyai ID yang sepadan (Sama ada guna Email atau Custom ID)
        snap.forEach(doc => {
            const data = doc.data();
            // Jika anda menggunakan Email sebagai ID untuk login pelajar
            if(data.email === idInput || data.name.includes(idInput)) {
                foundUser = {
                    uid: doc.id,
                    studentID: idInput, // Simpan ID yang dimasukkan
                    studentName: data.name,
                    email: data.email
                };
            }
        });

        if(!foundUser) {
            return Swal.fire('Ralat', 'ID Pelajar tidak dijumpai atau anda bukan berdaftar sebagai Pelajar!', 'error');
        }

        // Set data pelajar yang aktif
        activeStudent = foundUser;
        
        Swal.close();
        
        // Paparkan Portal
        document.getElementById('verifySection').classList.add('d-none');
        document.getElementById('mainPortal').classList.remove('d-none');
        
        // Kemaskini Paparan Header
        document.getElementById('userDisplayName').innerText = activeStudent.studentName;
        document.getElementById('userDisplayID').innerText = activeStudent.studentID;
        
        // Ambil data tambahan (Result & Materials)
        loadResults(activeStudent.studentID); 
        loadAutoMaterials(activeStudent.studentID); 
        fetchSVList();

    } catch (e) { 
        console.error(e);
        Swal.fire('Ralat', 'Gangguan rangkaian atau ralat database!', 'error'); 
    }
}
    async function loadResults(id) {
        const list = document.getElementById('resultsList');
        const q = query(collection(db, "course_registrations"), where("studentID", "==", id));
        const snap = await getDocs(q);
        list.innerHTML = "";
        
        if(snap.empty) {
            list.innerHTML = `<p class="text-center text-muted">Tiada subjek berdaftar.</p>`;
            return;
        }

        snap.forEach(d => {
            const data = d.data();
            let gClass = data.grade === 'A' ? 'bg-grade-a' : (data.grade === 'GAGAL' ? 'bg-grade-g' : 'bg-light');
            list.innerHTML += `
                <div class="portal-card d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="fw-bold mb-1">${data.course}</h6>
                        <p class="small text-muted mb-0">Quiz: ${data.quiz || 0}% | Markah: ${data.totalMark || 0}%</p>
                    </div>
                    <div class="grade-circle ${gClass}">${data.grade || '-'}</div>
                </div>`;
        });
    }

    async function loadAutoMaterials(studentID) {
        const display = document.getElementById('materialsDisplay');
        const qReg = query(collection(db, "course_registrations"), where("studentID", "==", studentID));
        const snapReg = await getDocs(qReg);
        let regCourses = snapReg.docs.map(d => d.data().course);

        const snapMat = await getDocs(collection(db, "materials"));
        display.innerHTML = "";
        let found = false;

        snapMat.forEach(d => {
            const m = d.data();
            if (regCourses.includes(m.course)) {
                found = true;
                display.innerHTML += `
                    <div class="portal-card border-start border-4 border-primary">
                        <span class="badge bg-primary mb-2">${m.course}</span>
                        <h6 class="fw-bold mb-1">${m.title}</h6>
                        <p class="small text-muted mb-2">${m.category || 'General'}</p>
                        <div class="bg-light p-3 rounded-3 small text-dark">${m.content}</div>
                    </div>`;
            }
        });
        if(!found) display.innerHTML = `<p class="text-center text-muted">Tiada bahan untuk subjek berdaftar anda.</p>`;
    }

    async function fetchSVList() {
        const svSelect = document.getElementById('newSupervisor');
        const snap = await getDocs(query(collection(db, "users"), where("role", "==", "supervisor")));
        svSelect.innerHTML = '<option value="">-- Pilih SV --</option>';
        snap.forEach(doc => svSelect.innerHTML += `<option value="${doc.data().email}">${doc.data().name}</option>`);
    }

    // LOGIK CEGAH DUPLICATE + SWEET ALERT
    window.registerNewCourse = async function() {
        const course = document.getElementById('newCourse').value;
        const svEmail = document.getElementById('newSupervisor').value;
        
        if(!svEmail) return Swal.fire('Info', 'Sila pilih Penyelia (SV)!', 'info');

        const regID = `${activeStudent.studentID}_${course.replace(/\s+/g, '')}`;
        
        Swal.fire({ title: 'Memproses...', didOpen: () => Swal.showLoading() });

        try {
            // Semak jika dokumen sudah wujud (Duplicate check)
            const docRef = doc(db, "course_registrations", regID);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                return Swal.fire('Gagal', `Anda sudah pun berdaftar untuk subjek ${course}!`, 'warning');
            }

            // Jika belum ada, baru daftar
            await setDoc(docRef, {
                studentID: activeStudent.studentID, 
                studentName: activeStudent.studentName,
                course: course, 
                semester: "Semester 1", 
                supervisorEmail: svEmail,
                quiz: 0, test: 0, midterm: 0, totalMark: 0, grade: "-", 
                status: "Normal", 
                timestamp: serverTimestamp()
            });

            Swal.fire('Berjaya!', `Subjek ${course} telah didaftarkan.`, 'success');
            loadResults(activeStudent.studentID);
            loadAutoMaterials(activeStudent.studentID);
        } catch (e) { 
            Swal.fire('Ralat', 'Gagal mendaftar subjek.', 'error'); 
        }
    }

    window.submitAssessment = async function() {
        const form = document.getElementById('assessmentForm');
        const formData = new FormData(form);
        let score = 0; let answered = 0;

        for (let i = 1; i <= 5; i++) {
            const val = formData.get(`q${i}`);
            if (val !== null) { score += parseInt(val); answered++; }
        }

        if (answered < 5) return Swal.fire('Info', 'Sila jawab semua soalan!', 'info');

        let risk = score >= 11 ? "TINGGI" : (score >= 6 ? "SEDERHANA" : "RENDAH");
        let color = score >= 11 ? "#d63031" : (score >= 6 ? "#fdcb6e" : "#00b894");

        Swal.fire({
            title: 'Hantar Penilaian?',
            text: "Data ini akan dihantar kepada Penyelia anda.",
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Ya, hantar!'
        }).then(async (result) => {
            if (result.isConfirmed) {
                try {
                    await addDoc(collection(db, "assessments"), {
                        studentID: activeStudent.studentID,
                        studentName: activeStudent.studentName,
                        supervisorEmail: activeStudent.supervisorEmail,
                        stress: score,
                        risk: risk,
                        timestamp: serverTimestamp()
                    });
                    
                    Swal.fire({
                        title: 'Berjaya!',
                        html: `Tahap Risiko Minda: <b style="color:${color}">${risk}</b>`,
                        icon: 'success'
                    });
                    form.reset();
                } catch (e) { Swal.fire('Ralat', 'Gagal hantar data.', 'error'); }
            }
        });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
