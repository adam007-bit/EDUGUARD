<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Supervisor Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-neon: #4361ee;
            --accent-neon: #4cc9f0;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-card: rgba(255, 255, 255, 0.9);
        }

        body { 
            background: var(--bg-gradient); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            color: #1e293b;
        }

        /* Top Navigation */
        .navbar {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.8) !important;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 15px 0;
        }

        /* SV Header Section */
        .sv-header { 
            background: linear-gradient(135deg, #1e293b, #334155); 
            color: white; 
            padding: 120px 0 60px 0; 
            border-radius: 0 0 40px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .sv-info-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 15px;
            border-radius: 12px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Dashboard Cards */
        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            border: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            transition: 0.3s;
        }

        .stat-card:hover { transform: translateY(-5px); }

        .icon-box {
            width: 50px; height: 50px;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        /* Student Table/List */
        .student-list-card {
            background: var(--glass-card);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 30px;
            margin-top: 30px;
        }

        .table thead th {
            background: #f8fafc;
            border: none;
            color: #64748b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 15px;
        }

        .table tbody td {
            padding: 20px 15px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
        }

        .status-pill {
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .btn-action {
            width: 35px; height: 35px;
            border-radius: 10px;
            display: inline-flex; align-items: center; justify-content: center;
            border: none; transition: 0.2s;
        }

        .btn-logout {
            color: #ef4444;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="#">
            <i class="bi bi-shield-check-fill me-2"></i>EduGuard <span class="text-warning">AI</span>
        </a>
        <a href="index.html" class="btn-logout"><i class="bi bi-box-arrow-right me-1"></i> Log Keluar</a>
    </div>
</nav>

<div class="sv-header">
    <div class="container text-center">
        <h2 class="fw-bold mb-2">Selamat Datang, <span id="svName">Penyelia</span></h2>
        <div class="d-flex justify-content-center gap-3">
            <span class="sv-info-badge"><i class="bi bi-envelope me-1"></i> <span id="svEmailDisplay">-</span></span>
            <span class="sv-info-badge"><i class="bi bi-person-badge me-1"></i> ROLE: RPS</span>
        </div>
    </div>
</div>

<div class="container mt-n4">
    <div class="row g-4 mt-2">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="icon-box bg-primary-subtle text-primary"><i class="bi bi-people-fill"></i></div>
                <h6 class="text-muted small fw-bold">JUMLAH PELAJAR</h6>
                <h2 class="fw-bold mb-0" id="totalStudents">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="icon-box bg-warning-subtle text-warning"><i class="bi bi-exclamation-triangle-fill"></i></div>
                <h6 class="text-muted small fw-bold">RISIKO TINGGI</h6>
                <h2 class="fw-bold mb-0" id="atRiskCount">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="icon-box bg-success-subtle text-success"><i class="bi bi-journal-check"></i></div>
                <h6 class="text-muted small fw-bold">PENILAIAN SELESAI</h6>
                <h2 class="fw-bold mb-0" id="completeAssess">0</h2>
            </div>
        </div>
    </div>

    <div class="student-list-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0">Senarai Pelajar di bawah RPS</h5>
            <button class="btn btn-sm btn-outline-primary rounded-pill px-3" onclick="refreshData()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
        </div>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Pelajar</th>
                        <th>Kursus</th>
                        <th>Semester</th>
                        <th>Status AI</th>
                        <th>Tindakan</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Ambil data SV dari Session/LocalStorage
    const currentSVEmail = localStorage.getItem("currentSVEmail") || "tiada";
    const currentSVName = localStorage.getItem("currentSVName") || "Penyelia";

    document.getElementById('svName').innerText = currentSVName;
    document.getElementById('svEmailDisplay').innerText = currentSVEmail;

    async function loadStudents() {
        const tbody = document.getElementById('studentTableBody');
        tbody.innerHTML = '<tr><td colspan="5" class="text-center">Memuatkan data pelajar...</td></tr>';

        try {
            const q = query(collection(db, "course_registrations"), where("supervisorEmail", "==", currentSVEmail));
            const snap = await getDocs(q);
            
            tbody.innerHTML = "";
            let count = 0;
            let risk = 0;

            snap.forEach(doc => {
                const data = doc.data();
                count++;
                
                // Logik warna status (AI Analysis)
                let statusClass = "bg-success-subtle text-success";
                let statusText = "Stabil";
                
                if(data.status === "At Risk") {
                    statusClass = "bg-danger-subtle text-danger";
                    statusText = "Berisiko";
                    risk++;
                }

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <div class="fw-bold">${data.studentName}</div>
                            <div class="small text-muted">${data.studentID}</div>
                        </td>
                        <td><span class="badge bg-light text-dark border">${data.course}</span></td>
                        <td class="small fw-semibold">${data.semester}</td>
                        <td><span class="status-pill ${statusClass}">${statusText}</span></td>
                        <td>
                            <button class="btn-action bg-primary text-white" onclick="viewProfile('${data.studentID}')" title="Lihat Profil">
                                <i class="bi bi-eye-fill"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('totalStudents').innerText = count;
            document.getElementById('atRiskCount').innerText = risk;

        } catch (e) {
            console.error(e);
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Gagal memuatkan data.</td></tr>';
        }
    }

    window.refreshData = loadStudents;
    loadStudents();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
