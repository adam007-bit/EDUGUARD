<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Dashboard Penyelia Terperinci</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; }
        .navbar { background: #ffffff !important; border-bottom: 1px solid #e2e8f0; }
        .navbar-brand { color: #4361ee !important; font-weight: 700; }
        
        .stat-card { border: none; border-radius: 16px; background: #ffffff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .icon-box { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        /* Baris Utama */
        .master-row { cursor: pointer; transition: background 0.2s; border-left: 4px solid transparent; }
        .master-row:hover { background-color: #f1f5f9 !important; }
        .row-critical { border-left-color: #ef4444; background-color: #fff1f2 !important; }
        
        .table thead th { background: #f8fafc; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; border: none; }
        .badge { padding: 6px 12px; border-radius: 8px; font-weight: 600; }
        
        /* Perincian (Collapse) */
        .detail-pane { background-color: #f1f5f9; padding: 20px !important; }
        .inner-table { border-radius: 12px; overflow: hidden; background: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top mb-4 py-3 shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="bi bi-shield-lock-fill me-2"></i>EduGuard <span class="text-warning">AI</span></a>
        <div class="d-flex align-items-center gap-3">
            <div class="text-end d-none d-md-block">
                <div class="fw-bold small" id="svNameDisplay">Penyelia...</div>
                <div class="text-muted" style="font-size: 0.7rem;" id="svEmailDisplay">memuatkan...</div>
            </div>
            <button onclick="handleLogout()" class="btn btn-outline-danger btn-sm px-3 rounded-3">Log Keluar</button>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-1">Analisis Holistik Pelajar</h4>
            <p class="text-muted small mb-0">Klik pada nama pelajar untuk melihat perincian kursus & psikometrik.</p>
        </div>
        <button onclick="exportToCSV()" class="btn btn-primary shadow-sm fw-bold px-4">Export CSV</button>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-card p-3">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-primary-subtle text-primary me-3"><i class="bi bi-people"></i></div>
                    <div><small class="text-muted fw-bold">JUMLAH PELAJAR</small><h3 id="totalCount" class="fw-bold mb-0">0</h3></div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card p-3">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-danger-subtle text-danger me-3"><i class="bi bi-heart-pulse"></i></div>
                    <div><small class="text-danger fw-bold">RISIKO TINGGI</small><h3 id="stressHighCount" class="text-danger fw-bold mb-0">0</h3></div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card p-3">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-warning-subtle text-warning me-3"><i class="bi bi-exclamation-triangle"></i></div>
                    <div><small class="text-warning fw-bold">PURATA GAGAL</small><h3 id="failCount" class="text-warning fw-bold mb-0">0</h3></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-5">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                    <tr>
                        <th class="ps-4">Profil Pelajar</th>
                        <th class="text-center">Bil. Kursus</th>
                        <th class="text-center">Purata Akademik</th>
                        <th class="text-center">Risiko Mental</th>
                        <th class="text-end pe-4">Status</th>
                    </tr>
                </thead>
                <tbody id="dashTable">
                    <tr><td colspan="5" class="text-center p-5 text-muted">Memproses data Firebase...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6"><div class="card border-0 shadow-sm p-4 rounded-4"><h6 class="fw-bold mb-4">Akademik</h6><div style="height: 250px;"><canvas id="gradeChart"></canvas></div></div></div>
        <div class="col-md-6"><div class="card border-0 shadow-sm p-4 rounded-4"><h6 class="fw-bold mb-4">Mental</h6><div style="height: 250px;"><canvas id="stressChart"></canvas></div></div></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let allGroupedData = [];
    let gradeChart, stressChart;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('svEmailDisplay').innerText = user.email;
            const qU = query(collection(db, "users"), where("email", "==", user.email));
            const snapU = await getDocs(qU);
            if(!snapU.empty) document.getElementById('svNameDisplay').innerText = snapU.docs[0].data().name;
            loadData(user.email);
        } else { window.location.href = "index.html"; }
    });

    function loadData(svEmail) {
        const qReg = query(collection(db, "course_registrations"), where("supervisorEmail", "==", svEmail));
        onSnapshot(qReg, (regSnap) => {
            const regs = [];
            regSnap.forEach(doc => regs.push(doc.data()));

            const qAssess = query(collection(db, "assessments"), where("supervisorEmail", "==", svEmail));
            onSnapshot(qAssess, (assessSnap) => {
                const aMap = new Map();
                assessSnap.forEach(doc => aMap.set(doc.data().studentID, doc.data()));
                renderUI(regs, aMap);
            });
        });
    }

    function renderUI(regs, aMap) {
        const tbody = document.getElementById('dashTable');
        tbody.innerHTML = '';
        
        // Grouping logic
        const groups = {};
        regs.forEach(r => {
            if(!groups[r.studentID]) groups[r.studentID] = { name: r.studentName, id: r.studentID, courses: [] };
            groups[r.studentID].courses.push(r);
        });

        let s_high = 0, s_fail = 0, s_norm = 0, s_excel = 0;
        let m_low = 0, m_med = 0, m_high = 0;

        Object.values(groups).forEach((stu, i) => {
            const assess = aMap.get(stu.id) || { risk: 'TIADA', stress: 0 };
            const avg = (stu.courses.reduce((a, b) => a + (parseFloat(b.totalMark)||0), 0) / stu.courses.length).toFixed(1);
            
            if(assess.risk === "HIGH") { s_high++; m_high++; }
            else if(assess.risk === "MEDIUM") m_med++;
            else m_low++;

            if(avg < 40) s_fail++; else if(avg >= 75) s_excel++; else s_norm++;

            const isCrit = (avg < 40 && assess.risk === "HIGH");
            const collId = `c_${stu.id}`;

            tbody.innerHTML += `
                <tr class="master-row ${isCrit ? 'row-critical' : ''}" data-bs-toggle="collapse" data-bs-target="#${collId}">
                    <td class="ps-4">
                        <div class="fw-bold"><i class="bi bi-chevron-down me-2 small"></i>${stu.name}</div>
                        <small class="text-muted">${stu.id}</small>
                    </td>
                    <td class="text-center"><span class="badge bg-light text-dark border">${stu.courses.length}</span></td>
                    <td class="text-center fw-bold">${avg}%</td>
                    <td class="text-center"><span class="badge ${assess.risk==='HIGH'?'bg-danger':(assess.risk==='MEDIUM'?'bg-warning text-dark':'bg-info')}">${assess.risk}</span></td>
                    <td class="text-end pe-4"><span class="badge ${isCrit?'bg-danger animate__animated animate__flash animate__infinite':'bg-light text-muted'}">${isCrit?'KRITIKAL':'STABIL'}</span></td>
                </tr>
                <tr class="collapse" id="${collId}">
                    <td colspan="5" class="detail-pane">
                        <div class="inner-table p-3 shadow-sm border bg-white">
                            <h6 class="fw-bold mb-3 text-primary">Rekod Akademik Terperinci</h6>
                            <table class="table table-sm mb-3">
                                <thead class="table-light"><tr><th>Kursus</th><th>Markah</th><th>Gred</th></tr></thead>
                                <tbody>${stu.courses.map(c=>`<tr><td>${c.course}</td><td>${c.totalMark}%</td><td>${c.grade}</td></tr>`).join('')}</tbody>
                            </table>
                            <div class="p-2 rounded bg-light border-start border-4 border-primary">
                                <small class="fw-bold d-block">Penilaian Psikometrik (5-Soalan):</small>
                                <small>Skor Stres: <strong>${assess.stress}/15</strong> | Status Mental: <strong>${assess.risk}</strong></small>
                            </div>
                        </div>
                    </td>
                </tr>`;
        });

        document.getElementById('totalCount').innerText = Object.keys(groups).length;
        document.getElementById('stressHighCount').innerText = s_high;
        document.getElementById('failCount').innerText = s_fail;
        updateCharts({fail: s_fail, normal: s_norm, excel: s_excel}, {LOW: m_low, MEDIUM: m_med, HIGH: m_high});
    }

    function updateCharts(a, m) {
        if(gradeChart) gradeChart.destroy();
        if(stressChart) stressChart.destroy();
        gradeChart = new Chart(document.getElementById('gradeChart'), {
            type: 'bar',
            data: { labels: ['Gagal', 'Normal', 'Cemerlang'], datasets: [{ data: [a.fail, a.normal, a.excel], backgroundColor: ['#ef4444', '#f59e0b', '#10b981'] }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
        stressChart = new Chart(document.getElementById('stressChart'), {
            type: 'doughnut',
            data: { labels: ['Low', 'Med', 'High'], datasets: [{ data: [m.LOW, m.MEDIUM, m.HIGH], backgroundColor: ['#0ea5e9', '#f59e0b', '#ef4444'] }] },
            options: { maintainAspectRatio: false, cutout: '70%' }
        });
    }

    window.handleLogout = () => { if(confirm("Keluar sistem?")) signOut(auth); };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
