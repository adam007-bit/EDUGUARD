<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Dashboard RPS</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body { background: #f0f2f5; font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; }
        .navbar { background: #ffffff !important; border-bottom: 1px solid #e2e8f0; }
        .navbar-brand { color: #4361ee !important; font-weight: 700; font-size: 1.4rem; }
        
        .stat-card { 
            border: none; border-radius: 16px; background: #ffffff; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; 
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        
        .icon-box { 
            width: 48px; height: 48px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; 
        }
        
        .main-card { border: none; border-radius: 20px; background: #ffffff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        .table thead th { 
            background: #f8fafc; border-top: none; padding: 16px; 
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; 
        }
        .table tbody td { padding: 18px 16px; border-color: #f1f5f9; }
        
        .btn-logout { border-radius: 10px; font-weight: 600; transition: 0.2s; }
        .btn-export { border-radius: 10px; font-weight: 600; background: #4361ee; color: white; border: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top mb-4 py-3">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="bi bi-shield-lock-fill"></i> EduGuard <span style="color: #f59e0b;">AI</span>
        </a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-muted d-none d-md-block small" id="svEmailDisplay">Memuatkan...</span>
            <button onclick="handleLogout()" class="btn btn-outline-danger btn-sm btn-logout px-3">
                <i class="bi bi-box-arrow-right"></i> Log Keluar
            </button>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-1">Selamat Datang, <span id="rpsNameDisplay" class="text-primary">...</span></h4>
            <p class="text-muted mb-0">Panel Pemantauan Pelajar Berdaftar.</p>
        </div>
        <button onclick="exportToCSV()" class="btn btn-export shadow-sm px-4 py-2">
            <i class="bi bi-file-earmark-spreadsheet me-2"></i> Export CSV
        </button>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card stat-card p-3 shadow-sm">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-primary-subtle text-primary me-3"><i class="bi bi-people"></i></div>
                    <div>
                        <h6 class="text-muted small fw-bold mb-0">JUMLAH PELAJAR</h6>
                        <h3 id="totalCount" class="fw-bold mb-0">0</h3>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card p-3 shadow-sm">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-success-subtle text-success me-3"><i class="bi bi-check-circle"></i></div>
                    <div>
                        <h6 class="text-success small fw-bold mb-0">STATUS AKTIF</h6>
                        <h3 id="activeStatus" class="text-success fw-bold mb-0">AKTIF</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card main-card overflow-hidden mb-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th class="ps-4">Profil Pelajar</th>
                        <th>Kursus & Subjek</th>
                        <th class="text-center">Status Pendaftaran</th>
                        <th class="text-center">Markah (%)</th>
                        <th class="text-center">Gred Akademik</th>
                        <th class="text-end pe-4">Tindakan</th>
                    </tr>
                </thead>
                <tbody id="dashTable">
                    <tr><td colspan="6" class="text-center p-5 text-muted">Mencari data pendaftaran dari sistem...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-12">
            <div class="card main-card p-4">
                <h6 class="fw-bold mb-3"><i class="bi bi-bar-chart-fill me-2"></i>Taburan Gred Akademik (Berdasarkan Pendaftaran)</h6>
                <div style="height: 300px;"><canvas id="gradeChart"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let allData = [];
    let gradeChartInstance = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('svEmailDisplay').innerText = user.email;
            fetchRPSName(user.email);
            loadSupervisorDashboard(user.email);
        } else {
            window.location.href = "index.html";
        }
    });

    async function fetchRPSName(email) {
        const q = query(collection(db, "users"), where("email", "==", email));
        const snap = await getDocs(q);
        if (!snap.empty) {
            document.getElementById('rpsNameDisplay').innerText = snap.docs[0].data().name || "RPS";
        }
    }

    function loadSupervisorDashboard(svEmail) {
        // Terus ambil data dari course_registrations
        const qReg = query(collection(db, "course_registrations"), where("supervisorEmail", "==", svEmail));
        
        onSnapshot(qReg, (snap) => {
            renderDashboard(snap);
        });
    }

    function renderDashboard(snap) {
        const tbody = document.getElementById('dashTable');
        tbody.innerHTML = '';
        allData = [];
        let grades = { A: 0, B: 0, C: 0, GAGAL: 0 };

        if (snap.empty) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center p-5 text-muted">Tiada rekod pelajar berdaftar di bawah seliaan anda.</td></tr>';
            document.getElementById('totalCount').innerText = "0";
            return;
        }

        snap.forEach(doc => {
            const data = doc.data();
            allData.push(data);

            const g = (data.grade || "").toUpperCase();
            if (['A', 'B', 'C'].includes(g)) grades[g]++;
            else if (g !== "" && g !== "-") grades.GAGAL++;

            tbody.innerHTML += `
                <tr class="animate__animated animate__fadeIn">
                    <td class="ps-4">
                        <div class="fw-bold">${data.studentName || 'N/A'}</div>
                        <small class="text-muted">${data.studentID || '-'}</small>
                    </td>
                    <td>
                        <span class="badge bg-light text-primary border">
                            ${data.course || data.subjectCode || '-'}
                        </span>
                    </td>
                    <td class="text-center">
                        <span class="badge bg-success-subtle text-success border border-success-subtle px-3">
                            <i class="bi bi-person-check me-1"></i> Berdaftar
                        </span>
                    </td>
                    <td class="text-center">${data.totalMark || '0'}%</td>
                    <td class="text-center fw-bold text-primary">${data.grade || '-'}</td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-outline-primary" onclick="alert('Buka Profil: ${data.studentID}')">
                            <i class="bi bi-eye"></i>
                        </td>
                </tr>`;
        });

        document.getElementById('totalCount').innerText = snap.size;
        updateCharts(grades);
    }

    function updateCharts(gradeData) {
        const ctxGrade = document.getElementById('gradeChart').getContext('2d');
        if (gradeChartInstance) gradeChartInstance.destroy();

        gradeChartInstance = new Chart(ctxGrade, {
            type: 'bar',
            data: {
                labels: ['A', 'B', 'C', 'Gagal'],
                datasets: [{ 
                    label: 'Bilangan Pelajar', 
                    data: [gradeData.A, gradeData.B, gradeData.C, gradeData.GAGAL], 
                    backgroundColor: '#4361ee', 
                    borderRadius: 8 
                }]
            },
            options: { 
                maintainAspectRatio: false, 
                scales: { 
                    y: { 
                        beginAtZero: true, 
                        ticks: { stepSize: 1 } 
                    } 
                } 
            }
        });
    }

    window.exportToCSV = () => {
        if (allData.length === 0) return;
        let csv = "Nama,ID,Kursus,Markah,Gred\n";
        allData.forEach(r => {
            csv += `"${r.studentName}","${r.studentID}","${r.course || r.subjectCode}",${r.totalMark},"${r.grade}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `EduGuard_Daftar_Pelajar.csv`;
        a.click();
    };

    window.handleLogout = () => {
        if(confirm("Log keluar?")) signOut(auth).then(() => window.location.href = "index.html");
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
