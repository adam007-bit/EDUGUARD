<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Analisis Data Pintar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #4361ee;
            --bg: #f4f7fe;
        }

        body { 
            background: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding-top: 90px; 
        }

        .navbar { 
            background: white; 
            border-bottom: 1px solid #e2e8f0; 
            padding: 15px 0;
        }

        /* Stat Cards */
        .stat-card {
            border: none;
            border-radius: 24px;
            padding: 1.5rem;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover { transform: translateY(-5px); }

        .icon-circle {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        /* Chart Boxes */
        .chart-box {
            background: white;
            padding: 2rem;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            margin-bottom: 25px;
            height: 100%;
        }

        .nav-link.active { 
            color: var(--primary) !important; 
            font-weight: 700; 
        }

        .btn-print {
            border-radius: 12px;
            font-weight: 600;
            padding: 8px 20px;
        }

        @media print {
            .navbar, .btn-print { display: none; }
            body { padding-top: 0; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="#">
            <i class="bi bi-cpu-fill me-2"></i>EduGuard AI
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link px-3" href="index.html">Utama</a></li>
                <li class="nav-item"><a class="nav-link px-3 active" href="chart.html">Analisis Carta</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="assessment.html">Penilaian</a></li>
                <li class="nav-item ms-lg-3">
                    <a href="index.html" class="btn btn-outline-danger btn-sm px-4" style="border-radius: 10px;">Log Keluar</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-0">Visualisasi Data Pintar</h3>
            <p class="text-muted small">Data ditarik secara real-time dari Firebase Cloud</p>
        </div>
        <button class="btn btn-primary btn-print" onclick="window.print()">
            <i class="bi bi-printer me-2"></i>Cetak Laporan
        </button>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="stat-card">
                <div class="icon-circle bg-primary-subtle text-primary"><i class="bi bi-database"></i></div>
                <h6 class="text-muted small fw-bold">TOTAL REKOD</h6>
                <h2 class="fw-bold mb-0" id="statTotal">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="icon-circle bg-danger-subtle text-danger"><i class="bi bi-exclamation-octagon"></i></div>
                <h6 class="text-muted small fw-bold">HIGH RISK</h6>
                <h2 class="fw-bold mb-0 text-danger" id="statHigh">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="icon-circle bg-warning-subtle text-warning"><i class="bi bi-activity"></i></div>
                <h6 class="text-muted small fw-bold">PURATA STRESS</h6>
                <h2 class="fw-bold mb-0" id="statStress">0.0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="icon-circle bg-success-subtle text-success"><i class="bi bi-heart-pulse"></i></div>
                <h6 class="text-muted small fw-bold">KESEJAHTERAAN</h6>
                <h2 class="fw-bold mb-0 text-success" id="statWell">0%</h2>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="chart-box">
                <h6 class="fw-bold mb-4 text-secondary uppercase"><i class="bi bi-bar-chart-fill me-2"></i>Taburan Risiko Siswa</h6>
                <canvas id="mainBarChart" style="max-height: 350px;"></canvas>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="chart-box">
                <h6 class="fw-bold mb-4 text-secondary uppercase"><i class="bi bi-pie-chart-fill me-2"></i>Nisbah Peratusan</h6>
                <canvas id="riskPieChart" style="max-height: 350px;"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    // 1. Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        databaseURL: "https://eduguard-ai-2742b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    // 2. Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Chart instances
    let barChart, pieChart;

    // 3. Listen to Real-time Data
    database.ref('assessments').on('value', (snapshot) => {
        const dataObj = snapshot.val();
        
        if (!dataObj) {
            console.warn("Tiada data ditemui di Firebase.");
            return;
        }

        const savedData = Object.values(dataObj);
        
        // 4. Calculate Analytics
        const total = savedData.length;
        const highCount = savedData.filter(d => d.risk.includes('HIGH')).length;
        const medCount = savedData.filter(d => d.risk.includes('MEDIUM')).length;
        const lowCount = savedData.filter(d => d.risk.includes('LOW')).length;
        
        // Purata Stress (Skala 1-5)
        const avgStress = (savedData.reduce((acc, curr) => acc + (curr.stress || 0), 0) / total).toFixed(1);
        
        // Skor Kesejahteraan (Low risk %)
        const wellPercentage = Math.round((lowCount / total) * 100);

        // 5. Update UI Counters
        document.getElementById('statTotal').innerText = total;
        document.getElementById('statHigh').innerText = highCount;
        document.getElementById('statStress').innerText = avgStress;
        document.getElementById('statWell').innerText = wellPercentage + "%";

        // 6. Render Charts
        renderVisuals(lowCount, medCount, highCount);
    });

    function renderVisuals(low, med, high) {
        // Hapus chart lama sebelum lukis baru (penting untuk refresh data)
        if (barChart) barChart.destroy();
        if (pieChart) pieChart.destroy();

        // Bar Chart
        const ctxBar = document.getElementById('mainBarChart').getContext('2d');
        barChart = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: ['Low Risk', 'Medium Risk', 'High Risk'],
                datasets: [{
                    label: 'Bilangan Pelajar',
                    data: [low, med, high],
                    backgroundColor: ['#22c55e', '#f59e0b', '#ef4444'],
                    borderRadius: 12,
                    hoverBackgroundColor: ['#16a34a', '#d97706', '#dc2626']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { 
                        beginAtZero: true, 
                        grid: { display: false },
                        ticks: { stepSize: 1 }
                    },
                    x: { grid: { display: false } }
                }
            }
        });

        // Doughnut Chart
        const ctxPie = document.getElementById('riskPieChart').getContext('2d');
        pieChart = new Chart(ctxPie, {
            type: 'doughnut',
            data: {
                labels: ['Low', 'Medium', 'High'],
                datasets: [{
                    data: [low, med, high],
                    backgroundColor: ['#22c55e', '#f59e0b', '#ef4444'],
                    borderWidth: 5,
                    borderColor: '#ffffff',
                    hoverOffset: 15
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '75%',
                plugins: { 
                    legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } }
                }
            }
        });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
