<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Attendance Scanner | Smart Rakan Pembimbing</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; font-family: 'Inter', sans-serif; }
        .scanner-header { background: linear-gradient(135deg, #1e3a8a, #4361ee); padding: 20px 0; border-bottom: 3px solid #fbbf24; }
        #reader { width: 100% !important; border-radius: 20px !important; overflow: hidden; border: 3px solid #fbbf24 !important; background: #000 !important; }
        .status-badge { background: rgba(30,58,138,0.9); backdrop-filter: blur(10px); border-radius: 30px; padding: 8px 20px; }
        .log-scroll { max-height: 400px; overflow-y: auto; }
        .log-scroll::-webkit-scrollbar { width: 4px; }
        .log-scroll::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        .stat-card { background: #1e293b; border-radius: 16px; padding: 15px; text-align: center; border: 1px solid #334155; }
        .qr-reader-region { margin: 0 auto !important; }
    </style>
</head>
<body>

<div class="scanner-header">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div><h4 class="fw-bold text-white mb-0"><i class="bi bi-qr-code-scan me-2"></i>RPS Attendance Scanner</h4><p class="text-white-50 small mb-0">Scan student QR code for class attendance</p></div>
            <div class="status-badge text-white"><i class="bi bi-wifi"></i> <span id="scannerStatus">Starting...</span></div>
        </div>
    </div>
</div>

<div class="container py-4">
    <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="stat-card"><i class="bi bi-people-fill text-primary fs-3"></i><h3 id="todayCount" class="fw-bold text-white mb-0 mt-2">0</h3><small class="text-muted">Today's Attendance</small></div></div>
        <div class="col-md-4"><div class="stat-card"><i class="bi bi-geo-alt-fill text-success fs-3"></i><h3 id="gpsStatus" class="fw-bold text-white mb-0 mt-2 fs-6">Checking...</h3><small class="text-muted">GPS Location</small></div></div>
        <div class="col-md-4"><div class="stat-card"><i class="bi bi-clock-fill text-warning fs-3"></i><h3 id="liveTime" class="fw-bold text-white mb-0 mt-2">--:--:--</h3><small class="text-muted">Current Time</small></div></div>
    </div>

    <div class="row g-4">
        <div class="col-lg-6"><div class="card bg-dark border-0 rounded-4 shadow-lg overflow-hidden"><div class="card-body p-4"><div id="reader"></div><div class="mt-3 text-center"><div class="alert alert-info small mb-0"><i class="bi bi-camera me-2"></i> Letakkan QR code di hadapan kamera</div></div></div></div></div>
        <div class="col-lg-6"><div class="card bg-dark border-0 rounded-4 shadow-lg"><div class="card-header bg-transparent border-bottom border-secondary"><h6 class="fw-bold text-white mb-0"><i class="bi bi-clock-history me-2"></i>Today's Attendance Log</h6></div><div class="card-body p-0"><div id="scanLog" class="log-scroll"><div class="text-center py-5 text-muted small">Waiting for scans...</div></div></div></div></div>
    </div>
    
    <div class="mt-4 text-center">
        <button class="btn btn-outline-light btn-sm rounded-pill px-4" onclick="window.location.href='host.html'"><i class="bi bi-arrow-left me-2"></i> Back to Dashboard</button>
        <button class="btn btn-outline-secondary btn-sm rounded-pill px-4 ms-2" onclick="refreshScanner()"><i class="bi bi-arrow-repeat me-2"></i> Refresh Scanner</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, set, get, serverTimestamp, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw", authDomain: "eduguard-ai-2742b.firebaseapp.com", projectId: "eduguard-ai-2742b", storageBucket: "eduguard-ai-2742b.firebasestorage.app", messagingSenderId: "96233022148", appId: "1:96233022148:web:1f903d72b3f79690409f91" };
    const app = initializeApp(firebaseConfig);
    const rtdb = getDatabase(app);
    const firestore = getFirestore(app);
    const today = new Date().toISOString().split('T')[0];
    let isProcessing = false;
    let html5QrcodeScanner = null;

    const CAMPUS_LOC = { lat: 6.459908432966171, lng: 100.35170018848842 };
    let isInCampus = false;
    let currentLocation = "Pauh Putra Campus";
    
    function calculateDistance(lat1, lon1, lat2, lon2) { const R = 6371; const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180; const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2; return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
    
    function checkGPS() { if (navigator.geolocation) { navigator.geolocation.getCurrentPosition((pos) => { const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, CAMPUS_LOC.lat, CAMPUS_LOC.lng); isInCampus = dist < 0.5; const gpsEl = document.getElementById('gpsStatus'); const scannerStatus = document.getElementById('scannerStatus'); if (isInCampus) { gpsEl.innerHTML = '<i class="bi bi-check-circle-fill text-success me-1"></i> Verified'; gpsEl.className = 'fw-bold text-white mb-0 mt-2 fs-6 text-success'; scannerStatus.innerHTML = '<i class="bi bi-check-circle-fill text-success me-1"></i> Ready - GPS Verified'; scannerStatus.className = 'text-success'; } else { gpsEl.innerHTML = '<i class="bi bi-exclamation-triangle-fill text-warning me-1"></i> Outside Campus'; gpsEl.className = 'fw-bold text-white mb-0 mt-2 fs-6 text-warning'; scannerStatus.innerHTML = '<i class="bi bi-exclamation-triangle-fill text-warning me-1"></i> GPS: Outside Campus Area'; scannerStatus.className = 'text-warning'; } }, (err) => { document.getElementById('gpsStatus').innerHTML = '<i class="bi bi-exclamation-triangle-fill text-danger me-1"></i> Failed'; document.getElementById('scannerStatus').innerHTML = 'GPS Error - Cannot verify location'; }, { enableHighAccuracy: true, timeout: 10000 }); } else { document.getElementById('gpsStatus').innerHTML = '<i class="bi bi-slash-circle text-danger me-1"></i> Not Supported'; } }
    
    async function recordAttendance(studentId) { if (isProcessing) { Swal.fire({ icon: 'warning', title: 'Please wait', text: 'Processing previous scan...', timer: 1000 }); return; } if (!isInCampus) { Swal.fire({ icon: 'error', title: 'Location Error', text: 'You must be within campus area to record attendance!' }); return; } isProcessing = true; try { const checkRef = ref(rtdb, `kehadiran_unimap/${today}/${studentId}`); const checkSnap = await get(checkRef); if (checkSnap.exists()) { Swal.fire({ icon: 'warning', title: 'Already Recorded', text: `${studentId} already marked present today`, timer: 1500 }); isProcessing = false; return; } let studentName = studentId; try { const userDoc = await getDoc(doc(firestore, "users", studentId)); if (userDoc.exists()) studentName = userDoc.data().name || studentId; } catch(e) {} const currentTime = new Date().toLocaleTimeString('ms-MY'); await set(ref(rtdb, `kehadiran_unimap/${today}/${studentId}`), { studentID: studentId, studentName: studentName, lokasi: currentLocation, masa: currentTime, timestamp: serverTimestamp() }); Swal.fire({ icon: 'success', title: 'Attendance Recorded!', text: `${studentName}`, timer: 1500, showConfirmButton: false }); loadTodayStats(); } catch (error) { console.error(error); Swal.fire({ icon: 'error', title: 'Error', text: 'Failed to record attendance' }); } setTimeout(() => { isProcessing = false; }, 1500); }
    
    function loadTodayStats() { const attendanceRef = ref(rtdb, `kehadiran_unimap/${today}`); onValue(attendanceRef, (snapshot) => { const container = document.getElementById('scanLog'); let count = 0; if (snapshot.exists()) { const data = snapshot.val(); const records = Object.values(data); count = records.length; container.innerHTML = ''; records.reverse().forEach(rec => { container.innerHTML += `<div class="border-bottom border-secondary p-3"><div class="d-flex justify-content-between align-items-center"><div><div class="fw-bold text-white">${escapeHtml(rec.studentName || rec.studentID)}</div><small class="text-muted">ID: ${rec.studentID}</small></div><div class="text-end"><span class="badge bg-success mb-1">Present</span><div><small class="text-muted">${rec.masa || '--:--'}</small></div></div></div><div class="small text-muted mt-1">📍 ${rec.lokasi || 'Kampus'}</div></div>`; }); } else { container.innerHTML = '<div class="text-center py-5 text-muted small">No scans yet today</div>'; } document.getElementById('todayCount').innerText = count; }); }
    
    function initScanner() { if (html5QrcodeScanner) { html5QrcodeScanner.clear(); } html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 280, height: 280 }, aspectRatio: 1.0 }); html5QrcodeScanner.render((decodedText) => { recordAttendance(decodedText); }, (error) => { }); document.getElementById('scannerStatus').innerHTML = '<i class="bi bi-camera-fill me-1"></i> Ready to Scan'; }
    
    window.refreshScanner = () => { initScanner(); Swal.fire({ toast: true, icon: 'success', title: 'Scanner Refreshed', timer: 1500, showConfirmButton: false }); };
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    setInterval(() => { document.getElementById('liveTime').innerHTML = new Date().toLocaleTimeString('ms-MY'); }, 1000);
    checkGPS();
    setInterval(checkGPS, 30000);
    loadTodayStats();
    initScanner();
</script>
</body>
</html>
