<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Dashboard Pelajar</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .nav-custom { background: white; border-bottom: 1px solid #e2e8f0; padding: 15px 0; }
        .header-box { background: #1e293b; color: white; padding: 40px 0; border-radius: 0 0 30px 30px; margin-bottom: 30px; }
        .course-card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; transition: 0.3s; margin-bottom: 15px; }
        .material-card { border-left: 5px solid #4361ee; background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .grade-circle { width: 50px; height: 50px; background: #eff6ff; color: #2563eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .section-title { font-weight: 700; color: #334155; margin-bottom: 20px; display: flex; align-items: center; }
        .section-title i { margin-right: 10px; color: #4361ee; }
    </style>
</head>
<body>

<nav class="navbar nav-custom">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand fw-bold text-primary"><i class="bi bi-shield-check-fill me-2"></i>EduGuard AI</span>
        <div>
            <button class="btn btn-primary btn-sm rounded-pill px-3 me-2" onclick="window.location.href='register_course.html'">
                <i class="bi bi-plus-circle me-1"></i> Daftar Kursus
            </button>
            <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="logout()">Keluar</button>
        </div>
    </div>
</nav>

<div class="header-box text-center">
    <div class="container">
        <h2 class="fw-bold mb-1">Hai, <span id="studentNameDisplay" class="text-warning">...</span></h2>
        <p class="opacity-50 small mb-0">No. ID: <span id="studentIDDisplay">...</span></p>
    </div>
</div>

<div class="container pb-5">
    <div class="row">
        <div class="col-lg-7">
            <h5 class="section-title"><i class="bi bi-journal-text"></i> Kursus Terdaftar & Gred</h5>
            <div id="courseList">
                <div class="text-center py-4"><div class="spinner-border text-primary spinner-border-sm"></div></div>
            </div>

            <h5 class="section-title mt-5"><i class="bi bi-brain"></i> Penilaian Psikometrik (Self-Assessment)</h5>
            <div class="card border-0 shadow-sm p-4 rounded-4">
                <p class="small text-muted">Sila lengkapkan penilaian ini untuk membantu kami memahami gaya pembelajaran anda.</p>
                <div id="psychometricStatus" class="alert alert-info py-2 small">Memeriksa status penilaian...</div>
                <button class="btn btn-dark w-100 fw-bold py-2" id="btnPsiko" onclick="openPsiko()">Mula Penilaian</button>
            </div>
        </div>

        <div class="col-lg-5">
            <h5 class="section-title"><i class="bi bi-cloud-download"></i> Bahan Pembelajaran</h5>
            <div id="materialList">
                <div class="text-center py-4 text-muted small">Mencari bahan untuk subjek anda...</div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const activeID = sessionStorage.getItem("activeUser");

    if (!activeID) window.location.href = "index.html";

    async function initDashboard() {
        try {
            // 1. Profil User
            const uSnap = await getDoc(doc(db, "users", activeID));
            if (uSnap.exists()) {
                document.getElementById('studentNameDisplay').innerText = uSnap.data().name;
                document.getElementById('studentIDDisplay').innerText = activeID;
                
                // Cek status psikometrik
                if(uSnap.data().psikoStatus === 'done') {
                    document.getElementById('psychometricStatus').className = "alert alert-success py-2 small";
                    document.getElementById('psychometricStatus').innerText = "✅ Penilaian telah disiapkan.";
                    document.getElementById('btnPsiko').innerText = "Lihat Keputusan";
                }
            }

            // 2. Kursus & Bahan
            loadCoursesAndMaterials();

        } catch (e) { console.error(e); }
    }

    async function loadCoursesAndMaterials() {
        const cContainer = document.getElementById('courseList');
        const mContainer = document.getElementById('materialList');
        
        const qC = query(collection(db, "course_registrations"), where("studentID", "==", activeID));
        const snapC = await getDocs(qC);

        if (snapC.empty) {
            cContainer.innerHTML = '<div class="alert alert-warning small">Anda belum mendaftar mana-mana kursus.</div>';
            return;
        }

        cContainer.innerHTML = '';
        mContainer.innerHTML = '';
        let registeredCourses = [];

        snapC.forEach(d => {
            const data = d.data();
            registeredCourses.push(data.course); // Simpan senarai subjek yang didaftar
            
            cContainer.innerHTML += `
                <div class="course-card d-flex align-items-center justify-content-between shadow-sm">
                    <div>
                        <h6 class="fw-bold mb-1">${data.course}</h6>
                        <span class="badge ${data.status === 'Marked' ? 'bg-success' : 'bg-warning text-dark'} rounded-pill" style="font-size: 0.6rem;">${data.status}</span>
                    </div>
                    <div class="d-flex align-items-center">
                        <div class="text-end me-3">
                            <div class="fw-bold text-primary small">${data.totalMark || 0}%</div>
                        </div>
                        <div class="grade-circle">${data.grade || '-'}</div>
                    </div>
                </div>`;
        });

        // 3. Muat turun Bahan (Hanya yang relevan dengan subjek pelajar)
        if (registeredCourses.length > 0) {
            const qM = query(collection(db, "materials"), where("course", "in", registeredCourses));
            const snapM = await getDocs(qM);
            
            if (snapM.empty) {
                mContainer.innerHTML = '<p class="text-muted small">Tiada bahan untuk subjek anda buat masa ini.</p>';
            } else {
                snapM.forEach(doc => {
                    const m = doc.data();
                    mContainer.innerHTML += `
                        <div class="material-card">
                            <div class="d-flex justify-content-between align-items-start">
                                <h6 class="fw-bold mb-1 text-primary">${m.title}</h6>
                                <span class="badge bg-light text-dark border small" style="font-size: 0.6rem;">${m.category}</span>
                            </div>
                            <p class="small text-muted mb-2" style="font-size: 0.75rem;">Subjek: ${m.course}</p>
                            <a href="${m.content}" target="_blank" class="btn btn-sm btn-outline-primary w-100">Buka Bahan <i class="bi bi-box-arrow-up-right ms-1"></i></a>
                        </div>`;
                });
            }
        }
    }

    window.openPsiko = () => {
        Swal.fire({
            title: 'Penilaian Psikometrik',
            html: `
                <div class="text-start small">
                    <p><b>1. Saya suka belajar secara visual (gambar/video).</b><br>
                    <input type="radio" name="q1" value="1"> Ya <input type="radio" name="q1" value="0"> Tidak</p>
                    <p><b>2. Saya lebih suka belajar dalam kumpulan.</b><br>
                    <input type="radio" name="q2" value="1"> Ya <input type="radio" name="q2" value="0"> Tidak</p>
                    <p><b>3. Saya selesa dengan subjek pengiraan/logik.</b><br>
                    <input type="radio" name="q3" value="1"> Ya <input type="radio" name="q3" value="0"> Tidak</p>
                </div>
            `,
            confirmButtonText: 'Hantar Jawapan',
            preConfirm: () => {
                // Sini anda boleh tambah logik simpan ke Firestore jika perlu
                return true;
            }
        }).then(async (result) => {
            if (result.isConfirmed) {
                // Update status di Firestore
                const { updateDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js");
                await updateDoc(doc(db, "users", activeID), { psikoStatus: 'done' });
                Swal.fire('Terima Kasih!', 'Jawapan anda telah direkodkan.', 'success').then(()=>location.reload());
            }
        });
    };

    window.logout = () => { sessionStorage.clear(); window.location.href = "index.html"; };
    initDashboard();
</script>
</body>
</html>
