<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Host Control Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary-color: #4361ee;
            --bg-body: #f8fafc;
        }

        body { 
            background-color: var(--bg-body); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1e293b;
        }

        .host-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            padding: 60px 0 80px 0;
            border-radius: 0 0 40px 40px;
            margin-bottom: -50px;
        }

        .glass-card {
            background: white;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .stat-card {
            border-top: 4px solid var(--primary-color);
        }

        .progress { background-color: #e2e8f0; border-radius: 10px; }
        
        .badge-a { background-color: #dcfce7; color: #166534; }
        .badge-fail { background-color: #fee2e2; color: #991b1b; }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #e2e8f0;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-radius: 12px;
            padding: 12px 25px;
            font-weight: 600;
        }

        #hostForm {
            border-left: 6px solid var(--primary-color);
            display: none;
        }

        .table thead th {
            background: #f1f5f9;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            padding: 15px;
        }
        
        /* Efek hover pada baris jadual */
        .table tbody tr:hover {
            background-color: #f8fafc;
        }
    </style>
</head>
<body>

<div class="host-header text-center">
    <div class="container animate__animated animate__fadeInDown">
        <h1 class="fw-bold mb-2"><i class="bi bi-cpu-fill text-info"></i> Host Control Panel</h1>
        <p class="opacity-75">Sistem Pengurusan Gred & Bahan Pembelajaran AI</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row g-3 mb-4 animate__animated animate__fadeInUp" style="animation-delay: 0.2s;">
        <div class="col-md-3 col-6">
            <div class="card glass-card p-3 text-center stat-card border-primary h-100">
                <small class="text-muted fw-bold">PURATA SKOR</small>
                <h2 class="fw-bold mb-0 text-primary" id="statAvg">0%</h2>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card glass-card p-3 text-center stat-card border-success h-100">
                <small class="text-muted fw-bold">LULUS</small>
                <h2 class="fw-bold mb-0 text-success" id="statPass">0</h2>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card glass-card p-3 text-center stat-card border-danger h-100">
                <small class="text-muted fw-bold">GAGAL</small>
                <h2 class="fw-bold mb-0 text-danger" id="statFail">0</h2>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card glass-card p-3 text-center stat-card border-warning h-100">
                <small class="text-muted fw-bold">PENDING</small>
                <h2 class="fw-bold mb-0 text-warning" id="statPending">0</h2>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card glass-card p-4 mb-4 border-0">
                <h5 class="fw-bold mb-4"><i class="bi bi-people me-2 text-primary"></i> Pengurusan Prestasi Pelajar</h5>
                <div class="row g-2">
                    <div class="col-md-9">
                        <select id="courseSelect" class="form-select shadow-sm">
                            <option value="">-- Pilih Subjek --</option>
                            <option value="Software Engineering">Software Engineering</option>
                            <option value="IoT Systems">IoT Systems</option>
                            <option value="Data Analytics">Data Analytics</option>
                            <option value="AI Solutions">AI Solutions</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary w-100 shadow-sm" onclick="searchBySubject()">
                            <i class="bi bi-search me-1"></i> Cari
                        </button>
                    </div>
                </div>

                <div id="searchResults" class="mt-4">
                    <div class="text-center py-5 text-muted">
                        <i class="bi bi-clipboard-data fs-1 opacity-25"></i>
                        <p>Pilih subjek dan tekan butang cari.</p>
                    </div>
                </div>
            </div>

            <form id="hostForm" class="card glass-card p-4 mb-4 shadow-lg animate__animated animate__fadeIn">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0">Penilaian: <span id="displayStudentName" class="text-primary"></span></h5>
                    <button type="button" class="btn-close" onclick="document.getElementById('hostForm').style.display='none'"></button>
                </div>
                <div class="row g-3">
                    <input type="hidden" id="currentDocId">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Quiz (20%)</label>
                        <input type="number" id="quiz" class="form-control" placeholder="0-100" oninput="liveGrade()">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Test (30%)</label>
                        <input type="number" id="test" class="form-control" placeholder="0-100" oninput="liveGrade()">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Midterm (50%)</label>
                        <input type="number" id="midterm" class="form-control" placeholder="0-100" oninput="liveGrade()">
                    </div>
                    <div class="col-12 d-flex justify-content-between align-items-center border-top pt-3">
                        <div>
                            <span class="text-muted small">Ramalan Gred: </span>
                            <span id="liveGradeText" class="fw-bold text-primary">-</span>
                        </div>
                        <button type="submit" class="btn btn-primary px-5">
                            <i class="bi bi-save me-2"></i> Sahkan & Simpan
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div class="col-lg-4">
            <div class="card glass-card p-4 border-0 h-100">
                <h5 class="fw-bold mb-4"><i class="bi bi-cloud-arrow-up me-2 text-success"></i> Muat Naik Bahan</h5>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Tajuk Bahan</label>
                    <input type="text" id="postTitle" class="form-control" placeholder="cth: Nota Minggu 1">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Subjek</label>
                    <select id="postCourse" class="form-select">
                        <option value="Software Engineering">Software Engineering</option>
                        <option value="IoT Systems">IoT Systems</option>
                        <option value="Data Analytics">Data Analytics</option>
                        <option value="AI Solutions">AI Solutions</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Kategori</label>
                    <select id="postCategory" class="form-select">
                        <option value="Lecture">Lecture</option>
                        <option value="Lab">Lab</option>
                        <option value="Nota">Nota</option>
                        <option value="Pengumuman">Pengumuman</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Link/Isi Kandungan</label>
                    <textarea id="postContent" class="form-control" rows="5" placeholder="Masukkan link Drive atau maklumat..."></textarea>
                </div>
                <button class="btn btn-dark w-100 py-3 shadow-sm fw-bold" onclick="uploadMaterial()">
                    <i class="bi bi-send me-2"></i> Publish Sekarang
                </button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, doc, updateDoc, collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Fungsi LIVE GRADE semasa menaip
    window.liveGrade = () => {
        const q = Number(document.getElementById('quiz').value) || 0;
        const t = Number(document.getElementById('test').value) || 0;
        const m = Number(document.getElementById('midterm').value) || 0;
        const total = (q * 0.2) + (t * 0.3) + (m * 0.5);
        let grade = total >= 80 ? "A" : total >= 60 ? "B" : total >= 40 ? "C" : (total > 0 ? "GAGAL" : "-");
        document.getElementById('liveGradeText').innerText = grade + ` (${total.toFixed(1)}%)`;
    };

    window.searchBySubject = async function() {
        const selected = document.getElementById('courseSelect').value;
        const resArea = document.getElementById('searchResults');
        if (!selected) return;

        resArea.innerHTML = `<div class="text-center p-5"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted">Sedang memuatkan data...</p></div>`;

        try {
            const q = query(collection(db, "course_registrations"), where("course", "==", selected));
            const snap = await getDocs(q);

            if (snap.empty) {
                resArea.innerHTML = `<div class="alert alert-light border text-center p-5">
                                        <i class="bi bi-emoji-frown fs-2 d-block mb-2 text-muted"></i>
                                        Tiada pelajar berdaftar untuk subjek ini.
                                     </div>`;
                updateStats(0, 0, 0, 0);
                return;
            }

            let pass = 0, fail = 0, pending = 0, sumMarks = 0, total = 0;
            let html = `<div class="table-responsive animate__animated animate__fadeIn">
                        <table class="table align-middle">
                        <thead><tr><th>Pelajar</th><th class="text-center">Prestasi</th><th class="text-center">Gred</th><th class="text-end">Aksi</th></tr></thead>
                        <tbody>`;

            snap.forEach(d => {
                const data = d.data();
                const mark = parseFloat(data.totalMark) || 0;
                total++;

                if(!data.grade) pending++;
                else if(data.grade === 'GAGAL') fail++;
                else { pass++; sumMarks += mark; }

                const barColor = mark >= 80 ? 'bg-success' : (mark >= 40 ? 'bg-primary' : 'bg-danger');

                html += `<tr>
                    <td>
                        <div class="fw-bold text-dark">${data.studentName}</div>
                        <small class="text-muted text-uppercase" style="font-size: 0.7rem;">ID: ${data.studentID}</small>
                    </td>
                    <td style="width: 150px;">
                        <div class="progress" style="height: 6px; margin-bottom: 4px;">
                            <div class="progress-bar ${barColor}" style="width: ${mark}%"></div>
                        </div>
                        <small class="text-muted" style="font-size: 10px;">${mark}% Berjaya</small>
                    </td>
                    <td class="text-center">
                        <span class="badge ${mark >= 80 ? 'badge-a' : (data.grade === 'GAGAL' ? 'badge-fail' : 'bg-light text-dark')} p-2 px-3 rounded-pill">
                            ${data.grade || 'PENDING'}
                        </span>
                    </td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-primary rounded-pill px-3 shadow-sm" 
                            onclick="prepareEdit('${d.id}', '${data.studentName}', ${data.quiz||0}, ${data.test||0}, ${data.midterm||0})">
                            <i class="bi bi-pencil-square me-1"></i> Skor
                        </button>
                    </td>
                </tr>`;
            });

            resArea.innerHTML = html + "</tbody></table></div>";
            updateStats(total > 0 ? (sumMarks/total).toFixed(1) : 0, pass, fail, pending);

        } catch (e) { Swal.fire('Ralat', e.message, 'error'); }
    };

    function updateStats(avg, p, f, pen) {
        document.getElementById('statAvg').innerText = avg + "%";
        document.getElementById('statPass').innerText = p;
        document.getElementById('statFail').innerText = f;
        document.getElementById('statPending').innerText = pen;
    }

    window.prepareEdit = (id, name, q, t, m) => {
        document.getElementById('currentDocId').value = id;
        document.getElementById('displayStudentName').innerText = name;
        document.getElementById('quiz').value = q;
        document.getElementById('test').value = t;
        document.getElementById('midterm').value = m;
        document.getElementById('hostForm').style.display = 'block';
        liveGrade(); // Kira gred awal
        window.scrollTo({ top: document.getElementById('hostForm').offsetTop - 50, behavior: 'smooth' });
    };

    document.getElementById('hostForm').onsubmit = async (e) => {
        e.preventDefault();
        const q = Number(document.getElementById('quiz').value);
        const t = Number(document.getElementById('test').value);
        const m = Number(document.getElementById('midterm').value);
        const total = (q * 0.2) + (t * 0.3) + (m * 0.5);
        let grade = total >= 80 ? "A" : total >= 60 ? "B" : total >= 40 ? "C" : "GAGAL";

        try {
            await updateDoc(doc(db, "course_registrations", document.getElementById('currentDocId').value), {
                quiz: q, test: t, midterm: m, totalMark: total.toFixed(2), grade,
                status: "Marked", lastUpdated: serverTimestamp()
            });
            Swal.fire({ title: 'Tersimpan!', text: 'Prestasi pelajar berjaya dikemaskini.', icon: 'success', timer: 2000, showConfirmButton: false });
            searchBySubject();
            document.getElementById('hostForm').style.display = 'none';
        } catch (e) { Swal.fire('Error', e.message, 'error'); }
    };

    window.uploadMaterial = async () => {
        const title = document.getElementById('postTitle').value;
        const content = document.getElementById('postContent').value;
        if(!title || !content) return Swal.fire('Info', 'Sila isi tajuk dan link bahan!', 'info');

        try {
            await addDoc(collection(db, "materials"), {
                title, content, course: document.getElementById('postCourse').value,
                category: document.getElementById('postCategory').value,
                datePosted: serverTimestamp()
            });
            Swal.fire('Berjaya!', 'Bahan telah diterbitkan ke dashboard pelajar.', 'success');
            document.getElementById('postTitle').value = "";
            document.getElementById('postContent').value = "";
        } catch (e) { Swal.fire('Error', e.message, 'error'); }
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
