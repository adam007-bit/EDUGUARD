<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard - Host Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <h2 class="fw-bold text-primary mb-4"><i class="bi bi-cpu-fill"></i> Host Control Panel</h2>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title fw-bold">Pengurusan Markah Pelajar</h5>
            <div class="row g-2 mt-3">
                <div class="col-md-8">
                    <select id="courseSelect" class="form-select">
                        <option value="">-- Pilih Subjek --</option>
                        <option value="Software Engineering">Software Engineering</option>
                        <option value="IoT Systems">IoT Systems</option>
                        <option value="AI Solutions">AI Solutions</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-primary w-100" onclick="searchBySubject()">
                        <i class="bi bi-search"></i> Cari Pelajar
                    </button>
                </div>
            </div>
            <div id="searchResults" class="mt-4"></div>
        </div>
    </div>

    <form id="hostForm" class="card shadow-sm p-4 mb-4 border-primary" style="display:none;">
        <h5 class="fw-bold border-bottom pb-2 mb-3">Kemasukan Markah: <span id="displayStudentName" class="text-primary"></span></h5>
        <div class="row g-3">
            <input type="hidden" id="svEmail">
            <div class="col-md-4">
                <label class="form-label small">Quiz (20%)</label>
                <input type="number" id="quiz" class="form-control" max="100" required>
            </div>
            <div class="col-md-4">
                <label class="form-label small">Test (30%)</label>
                <input type="number" id="test" class="form-control" max="100" required>
            </div>
            <div class="col-md-4">
                <label class="form-label small">Midterm (50%)</label>
                <input type="number" id="midterm" class="form-control" max="100" required>
            </div>
            <div class="col-12 mt-4 text-end">
                <button type="button" class="btn btn-secondary me-2" onclick="this.parentElement.parentElement.parentElement.style.display='none'">Batal</button>
                <button type="submit" class="btn btn-success px-4">Simpan & Hantar ke Dashboard</button>
            </div>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title fw-bold">Muat Naik Bahan Pembelajaran</h5>
            <div class="row g-3 mt-2">
                <div class="col-md-6">
                    <input type="text" id="postTitle" class="form-control" placeholder="Tajuk Bahan">
                </div>
                <div class="col-md-3">
                    <select id="postCourse" class="form-select">
                        <option value="Software Engineering">Software Engineering</option>
                        <option value="IoT Systems">IoT Systems</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select id="postCategory" class="form-select">
                        <option value="Lecture">Lecture</option>
                        <option value="Lab">Lab</option>
                        <option value="Assignment">Assignment</option>
                    </select>
                </div>
                <div class="col-12">
                    <textarea id="postContent" class="form-control" rows="3" placeholder="Kandungan/Link Bahan"></textarea>
                </div>
                <div class="col-12 text-end">
                    <button class="btn btn-dark w-100" onclick="uploadMaterial()">Hantar Bahan</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, doc, updateDoc, collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentEditDocId = null;

    // --- CARI PELAJAR ---
    window.searchBySubject = async function() {
        const selectedCourse = document.getElementById('courseSelect').value;
        const resultsArea = document.getElementById('searchResults');
        if (!selectedCourse) return alert("Pilih subjek!");

        resultsArea.innerHTML = "Memuatkan...";

        try {
            const q = query(collection(db, "course_registrations"), where("course", "==", selectedCourse));
            const snap = await getDocs(q);

            if (snap.empty) {
                resultsArea.innerHTML = "Tiada pelajar.";
                return;
            }

            let html = `<table class="table table-sm"><thead><tr><th>Nama</th><th>ID</th><th>Gred</th><th>Aksi</th></tr></thead><tbody>`;
            snap.forEach(d => {
                const data = d.data();
                html += `<tr>
                    <td>${data.studentName}</td>
                    <td>${data.studentID}</td>
                    <td><span class="badge bg-info">${data.grade || '-'}</span></td>
                    <td><button class="btn btn-sm btn-primary" onclick="prepareEdit('${d.id}', '${data.studentName}', ${data.quiz||0}, ${data.test||0}, ${data.midterm||0}, '${data.supervisorEmail||''}')">Edit</button></td>
                </tr>`;
            });
            resultsArea.innerHTML = html + "</tbody></table>";
        } catch (e) { alert(e.message); }
    };

    // --- PERSEDIAAN EDIT ---
    window.prepareEdit = (id, name, q, t, m, email) => {
        currentEditDocId = id;
        document.getElementById('displayStudentName').innerText = name;
        document.getElementById('quiz').value = q;
        document.getElementById('test').value = t;
        document.getElementById('midterm').value = m;
        document.getElementById('svEmail').value = email;
        document.getElementById('hostForm').style.display = 'block';
    };

    // --- SIMPAN MARKAH ---
    document.getElementById('hostForm').onsubmit = async (e) => {
        e.preventDefault();
        const quiz = Number(document.getElementById('quiz').value);
        const test = Number(document.getElementById('test').value);
        const midterm = Number(document.getElementById('midterm').value);
        const svEmail = document.getElementById('svEmail').value;

        const totalMark = (quiz * 0.2) + (test * 0.3) + (midterm * 0.5);
        let grade = totalMark >= 80 ? "A" : totalMark >= 60 ? "B" : totalMark >= 40 ? "C" : "GAGAL";

        try {
            await updateDoc(doc(db, "course_registrations", currentEditDocId), {
                quiz, test, midterm, totalMark: totalMark.toFixed(2), grade,
                status: "Marked", lastUpdated: serverTimestamp()
            });
            alert("Markah dikemaskini!");
            searchBySubject();
            document.getElementById('hostForm').style.display = 'none';
        } catch (e) { alert(e.message); }
    };

    // --- UPLOAD MATERIAL ---
    window.uploadMaterial = async () => {
        const title = document.getElementById('postTitle').value;
        const content = document.getElementById('postContent').value;
        if(!title) return;

        await addDoc(collection(db, "materials"), {
            title, content, course: document.getElementById('postCourse').value,
            category: document.getElementById('postCategory').value,
            datePosted: serverTimestamp()
        });
        alert("Bahan Berjaya Dihantar!");
    };
</script>
</body>
</html>
