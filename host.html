<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Master Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; font-family: 'Inter', sans-serif; }
        .host-container { max-width: 850px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-submit { background: #4361ee; color: white; width: 100%; border-radius: 12px; padding: 14px; font-weight: 600; transition: 0.3s; border: none; }
        .btn-submit:hover { background: #3046bd; transform: translateY(-2px); }
        .search-box { background: #eef2ff; padding: 25px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #e0e7ff; }
        .readonly-input { background-color: #f1f5f9 !important; font-weight: 500; color: #475569; }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="host-container">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark"><i class="bi bi-database-fill-gear text-primary"></i> Panel Pengurusan Markah (Host)</h3>
            <p class="text-muted">Pilih subjek untuk memaparkan senarai pelajar dan mengemaskini markah.</p>
        </div>
        
        <div class="search-box shadow-sm">
            <label class="form-label fw-bold"><i class="bi bi-book"></i> Pilih Subjek & Lihat Senarai Pelajar</label>
            <div class="input-group">
                <select id="searchSubject" class="form-select form-select-lg">
                    <option value="" disabled selected>-- Pilih Subjek --</option>
                    <option value="Sains Komputer">Sains Komputer</option>
                    <option value="Ekonomi">Ekonomi</option>
                    <option value="Matematik">Matematik</option>
                    <option value="Fizik">Fizik</option>
                </select>
                <button class="btn btn-primary px-4" type="button" onclick="searchBySubject()">
                    <i class="bi bi-people-fill"></i> Papar Pelajar
                </button>
            </div>
            <small class="text-primary mt-2 d-block">* Data pelajar akan ditarik secara automatik dari sistem.</small>
        </div>

        <div id="searchResults" class="mb-4"></div>

        <form id="hostForm" style="display: none;" class="p-4 border rounded shadow-sm bg-light">
            <h5 class="fw-bold mb-3"><i class="bi bi-pencil-square text-primary"></i> Kemaskini Markah & Penilaian</h5>
            
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Nama Pelajar</label>
                    <input type="text" id="studentName" class="form-control readonly-input" readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Subjek Terpilih</label>
                    <select id="subjectSelect" class="form-select readonly-input" readonly disabled>
                        </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Quiz (%)</label>
                    <input type="number" id="quiz" class="form-control" min="0" max="100" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Test (%)</label>
                    <input type="number" id="test" class="form-control" min="0" max="100" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Midterm (%)</label>
                    <input type="number" id="midterm" class="form-control" min="0" max="100" required>
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold text-muted small"><i class="bi bi-lock-fill"></i> Supervisor Bertanggungjawab</label>
                    <input type="email" id="svEmail" class="form-control bg-light" readonly>
                    <small class="text-muted">Hantaran markah diselaraskan terus ke dashboard supervisor di atas.</small>
                </div>

                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-submit shadow">
                        <i class="bi bi-cloud-arrow-up-fill"></i> Simpan & Hantar Keputusan
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<script type="module" src="host.js"></script>
</body>
</html>
