<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGuard AI | Host Control Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #4361ee;
            --primary-light: #4895ef;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --dark: #1e293b;
            --bg-body: #f1f5f9;
        }

        body { 
            background-color: var(--bg-body); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #334155;
            overflow-x: hidden;
        }

        .host-header {
            background: linear-gradient(135deg, var(--dark) 0%, #334155 100%);
            color: white;
            padding: 40px 0 100px 0;
            border-radius: 0 0 30px 30px;
            position: relative;
        }

        .main-container { margin-top: -60px; position: relative; z-index: 10; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card { border-bottom: 5px solid transparent; padding: 20px; }
        .stat-card:hover { transform: translateY(-5px); }
        .border-primary { border-bottom-color: var(--primary) !important; }
        .border-success { border-bottom-color: var(--success) !important; }
        .border-danger { border-bottom-color: var(--danger) !important; }
        .border-warning { border-bottom-color: var(--warning) !important; }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: 14px;
            padding: 12px 24px;
            font-weight: 600;
        }

        .table-custom thead th {
            background: transparent;
            border-bottom: 2px solid #f1f5f9;
            color: #64748b;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 18px;
        }

        .grade-badge {
            padding: 6px 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .badge-a { background: #dcfce7; color: #166534; }
        .badge-f { background: #fee2e2; color: #991b1b; }
        .badge-pending { background: #fef9c3; color: #854d0e; }

        .progress { height: 8px; border-radius: 10px; background: #f1f5f9; }

        #hostForm { border-top: 8px solid var(--primary); display: none; }

        .lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="lang-switcher">
    <button onclick="toggleLanguage()" class="btn btn-outline-light btn-sm rounded-pill px-3 fw-bold">
        <i class="bi bi-translate me-1"></i> <span id="langBtn">BM</span>
    </button>
</div>

<div class="host-header text-center">
    <div class="container animate__animated animate__fadeIn">
        <h1 class="fw-bold mb-1"><i class="bi bi-shield-lock-fill text-info me-2"></i>EduGuard</h1>
        <p class="opacity-75 small" data-i18n="headerSubtitle">Strategic Evaluation System & Digital Archive</p>
    </div>
</div>

<div class="container main-container mb-5">
    <div class="row g-3 mb-4 animate__animated animate__fadeInUp">
        <div class="col-md-3">
            <div class="card glass-card stat-card border-primary">
                <small class="text-muted fw-bold d-block" data-i18n="statAvg">OVERALL AVERAGE</small>
                <h3 class="fw-bold mb-0 text-primary" id="statAvg">0%</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card glass-card stat-card border-success">
                <small class="text-muted fw-bold d-block" data-i18n="statPass">STUDENTS PASSED</small>
                <h3 class="fw-bold mb-0 text-success" id="statPass">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card glass-card stat-card border-danger">
                <small class="text-muted fw-bold d-block" data-i18n="statFail">STUDENTS FAILED</small>
                <h3 class="fw-bold mb-0 text-danger" id="statFail">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card glass-card stat-card border-warning">
                <small class="text-muted fw-bold d-block" data-i18n="statPending">PENDING EVALUATION</small>
                <h3 class="fw-bold mb-0 text-warning" id="statPending">0</h3>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card glass-card p-4 mb-4 border-0">
                <h5 class="fw-bold mb-4" data-i18n="dirTitle">Student Performance Directory</h5>
                
                <div class="row g-2 mb-4">
                    <div class="col-md-9">
                        <select id="courseSelect" class="form-select shadow-sm border-0">
                            <option value="" data-i18n="selectSubject">-- Select Subject Program --</option>
                            <option value="Software Engineering">Software Engineering</option>
                            <option value="IoT Systems">IoT Systems</option>
                            <option value="Data Analytics">Data Analytics</option>
                            <option value="AI Solutions">AI Solutions</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary w-100" onclick="searchBySubject()" data-i18n="btnView">View</button>
                    </div>
                </div>

                <div id="searchResults">
                    <div class="text-center py-5">
                        <p class="text-muted small" data-i18n="initialMsg">Please select a subject to begin data analysis.</p>
                    </div>
                </div>
            </div>

            <form id="hostForm" class="card glass-card p-4 mb-4 animate__animated animate__slideInUp">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h6 class="fw-bold mb-0"><span data-i18n="formTitle">Grade Input:</span> <span id="displayStudentName" class="text-primary"></span></h6>
                    <button type="button" class="btn-close" onclick="document.getElementById('hostForm').style.display='none'"></button>
                </div>
                
                <div class="row g-3">
                    <input type="hidden" id="currentDocId">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold" data-i18n="labelQuiz">Quiz (20%)</label>
                        <input type="number" id="quiz" class="form-control" oninput="liveGrade()">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold" data-i18n="labelTest">Test (30%)</label>
                        <input type="number" id="test" class="form-control" oninput="liveGrade()">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold" data-i18n="labelMid">Midterm (50%)</label>
                        <input type="number" id="midterm" class="form-control" oninput="liveGrade()">
                    </div>
                    <div class="col-12 d-flex justify-content-between align-items-center border-top pt-4 mt-3">
                        <div>
                            <p class="text-muted small mb-0" data-i18n="currentAnalysis">Current Grade Analysis</p>
                            <h4 id="liveGradeText" class="fw-bold text-primary mb-0">-</h4>
                        </div>
                        <button type="submit" class="btn btn-primary px-5" data-i18n="btnSave">Save Score</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="col-lg-4">
            <div class="card glass-card p-4 border-0 mb-4">
                <h5 class="fw-bold mb-4" data-i18n="resTitle">AI Resource Center</h5>
                <div class="mb-3">
                    <label class="form-label small fw-bold" data-i18n="resMaterial">Material Title</label>
                    <input type="text" id="postTitle" class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold" data-i18n="resLink">Access Link / URL</label>
                    <textarea id="postContent" class="form-control" rows="3"></textarea>
                </div>
                <button class="btn btn-dark w-100 py-3 shadow-sm" onclick="uploadMaterial()" data-i18n="btnPublish">Publish Material</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, doc, updateDoc, collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDup2zZ06JLmQCHPc8zGbetLUsXMjX3mjw",
        authDomain: "eduguard-ai-2742b.firebaseapp.com",
        projectId: "eduguard-ai-2742b",
        storageBucket: "eduguard-ai-2742b.firebasestorage.app",
        messagingSenderId: "96233022148",
        appId: "1:96233022148:web:1f903d72b3f79690409f91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Multi-language System
    let currentLang = 'en';
    const translations = {
        en: {
            headerSubtitle: "Strategic Evaluation System & Digital Archive",
            statAvg: "OVERALL AVERAGE", statPass: "STUDENTS PASSED", statFail: "STUDENTS FAILED", statPending: "PENDING EVALUATION",
            dirTitle: "Student Performance Directory", selectSubject: "-- Select Subject Program --", btnView: "View",
            initialMsg: "Please select a subject to begin data analysis.", formTitle: "Grade Input:",
            labelQuiz: "Quiz (20%)", labelTest: "Test (30%)", labelMid: "Midterm (50%)", currentAnalysis: "Current Grade Analysis",
            btnSave: "Save Score", resTitle: "AI Resource Center", resMaterial: "Material Title", resLink: "Access Link / URL",
            btnPublish: "Publish Material", colInfo: "Student Information", colStats: "Score Statistics", colGrade: "Grade",
            colAction: "Action", failed: "FAILED", pending: "NA"
        },
        ms: {
            headerSubtitle: "Sistem Penilaian Strategik & Arkib Digital",
            statAvg: "PURATA KESELURUHAN", statPass: "PELAJAR LULUS", statFail: "PELAJAR GAGAL", statPending: "MENUNGGU PENILAIAN",
            dirTitle: "Direktori Prestasi Pelajar", selectSubject: "-- Pilih Program Subjek --", btnView: "Lihat",
            initialMsg: "Sila pilih subjek untuk memulakan analisis data.", formTitle: "Input Gred:",
            labelQuiz: "Kuiz (20%)", labelTest: "Ujian (30%)", labelMid: "Pertengahan (50%)", currentAnalysis: "Analisis Gred Semasa",
            btnSave: "Simpan Markah", resTitle: "Pusat Sumber AI", resMaterial: "Tajuk Bahan", resLink: "Pautan Akses / URL",
            btnPublish: "Terbitkan Bahan", colInfo: "Maklumat Pelajar", colStats: "Statistik Markah", colGrade: "Gred",
            colAction: "Tindakan", failed: "GAGAL", pending: "TIADA"
        }
    };

    window.toggleLanguage = () => {
        currentLang = currentLang === 'en' ? 'ms' : 'en';
        document.getElementById('langBtn').innerText = currentLang === 'en' ? 'BM' : 'EN';
        applyTranslations();
        if(document.getElementById('courseSelect').value) searchBySubject(); 
    };

    function applyTranslations() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            el.innerText = translations[currentLang][key];
        });
    }

    // Firebase Functions
    window.liveGrade = () => {
        const q = Number(document.getElementById('quiz').value) || 0;
        const t = Number(document.getElementById('test').value) || 0;
        const m = Number(document.getElementById('midterm').value) || 0;
        const total = (q * 0.2) + (t * 0.3) + (m * 0.5);
        let grade = total >= 80 ? "A" : total >= 60 ? "B" : total >= 40 ? "C" : (total > 0 ? translations[currentLang].failed : "-");
        document.getElementById('liveGradeText').innerText = grade + ` (${total.toFixed(1)}%)`;
    };

    window.searchBySubject = async function() {
        const selected = document.getElementById('courseSelect').value;
        const resArea = document.getElementById('searchResults');
        if (!selected) return;

        resArea.innerHTML = `<div class="text-center p-5"><div class="spinner-grow text-primary"></div></div>`;

        try {
            const q = query(collection(db, "course_registrations"), where("course", "==", selected));
            const snap = await getDocs(q);

            if (snap.empty) {
                resArea.innerHTML = `<div class="text-center p-5"><p class="text-muted">No students found.</p></div>`;
                return;
            }

            let pass = 0, fail = 0, pending = 0, sumMarks = 0, total = 0;
            let html = `<div class="table-responsive"><table class="table table-custom">
                <thead><tr>
                    <th>${translations[currentLang].colInfo}</th>
                    <th>${translations[currentLang].colStats}</th>
                    <th class="text-center">${translations[currentLang].colGrade}</th>
                    <th class="text-end">${translations[currentLang].colAction}</th>
                </tr></thead><tbody>`;

            snap.forEach(d => {
                const data = d.data();
                const mark = parseFloat(data.totalMark) || 0;
                total++;
                if(!data.grade) pending++;
                else if(data.grade === 'FAILED' || data.grade === 'GAGAL') fail++;
                else { pass++; sumMarks += mark; }

                html += `<tr>
                    <td><span class="fw-bold d-block">${data.studentName}</span><code class="small text-muted">${data.studentID}</code></td>
                    <td style="width: 200px;">
                        <div class="d-flex align-items-center">
                            <div class="progress w-100 me-2"><div class="progress-bar ${mark >= 40 ? 'bg-primary':'bg-danger'}" style="width: ${mark}%"></div></div>
                            <small>${mark}%</small>
                        </div>
                    </td>
                    <td class="text-center">
                        <span class="grade-badge ${mark >= 80 ? 'badge-a' : (data.grade === 'FAILED' || data.grade === 'GAGAL' ? 'badge-f' : 'badge-pending')}">
                            ${data.grade || translations[currentLang].pending}
                        </span>
                    </td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-light border rounded-pill" onclick="prepareEdit('${d.id}', '${data.studentName}', ${data.quiz||0}, ${data.test||0}, ${data.midterm||0})">
                            <i class="bi bi-pencil-square"></i>
                        </button>
                    </td>
                </tr>`;
            });

            resArea.innerHTML = html + "</tbody></table></div>";
            document.getElementById('statAvg').innerText = (total > 0 ? (sumMarks/total).toFixed(1) : 0) + "%";
            document.getElementById('statPass').innerText = pass;
            document.getElementById('statFail').innerText = fail;
            document.getElementById('statPending').innerText = pending;

        } catch (e) { console.error(e); }
    };

    window.prepareEdit = (id, name, q, t, m) => {
        document.getElementById('currentDocId').value = id;
        document.getElementById('displayStudentName').innerText = name;
        document.getElementById('quiz').value = q;
        document.getElementById('test').value = t;
        document.getElementById('midterm').value = m;
        document.getElementById('hostForm').style.display = 'block';
        liveGrade();
        window.scrollTo({ top: document.getElementById('hostForm').offsetTop - 80, behavior: 'smooth' });
    };

    document.getElementById('hostForm').onsubmit = async (e) => {
        e.preventDefault();
        const q = Number(document.getElementById('quiz').value);
        const t = Number(document.getElementById('test').value);
        const m = Number(document.getElementById('midterm').value);
        const total = (q * 0.2) + (t * 0.3) + (m * 0.5);
        let grade = total >= 80 ? "A" : total >= 60 ? "B" : total >= 40 ? "C" : translations[currentLang].failed;

        try {
            await updateDoc(doc(db, "course_registrations", document.getElementById('currentDocId').value), {
                quiz: q, test: t, midterm: m, totalMark: total.toFixed(2), grade,
                status: "Marked", lastUpdated: serverTimestamp()
            });
            Swal.fire({ icon: 'success', title: currentLang === 'en' ? 'Saved!' : 'Disimpan!', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false });
            searchBySubject();
            document.getElementById('hostForm').style.display = 'none';
        } catch (e) { alert(e.message); }
    };

    window.uploadMaterial = async () => {
        const title = document.getElementById('postTitle').value;
        const content = document.getElementById('postContent').value;
        if(!title || !content) return Swal.fire('Error', 'Please fill all fields', 'error');

        try {
            await addDoc(collection(db, "materials"), {
                title, content, course: document.getElementById('courseSelect').value || "General",
                category: "Lecture", datePosted: serverTimestamp()
            });
            Swal.fire('Success', 'Material Published', 'success');
            document.getElementById('postTitle').value = "";
            document.getElementById('postContent').value = "";
        } catch (e) { alert(e.message); }
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
